<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>habit-grow — 測試套件</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;padding:16px}
  h1{font-size:20px;margin-bottom:12px;color:#222}
  #summary{padding:10px 14px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:16px}
  #summary.pass{background:#d4edda;color:#155724}
  #summary.fail{background:#f8d7da;color:#721c24}
  #summary.running{background:#fff3cd;color:#856404}
  .suite{margin-bottom:20px}
  .suite-title{font-size:13px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .case{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:5px;margin-bottom:3px;font-size:13px}
  .case.pass{background:#f0faf3}
  .case.fail{background:#fff2f2}
  .icon{flex-shrink:0;font-size:14px}
  .name{color:#333;flex:1}
  .err{color:#c00;font-size:11px;margin-top:2px;font-family:monospace;word-break:break-word}
  #frame-wrap{position:fixed;right:-9999px;width:400px;height:600px}
  iframe{width:100%;height:100%;border:0}
  .badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;margin-left:6px}
  .badge.pass{background:#28a745;color:#fff}
  .badge.fail{background:#dc3545;color:#fff}
</style>
</head>
<body>
<h1>habit-grow 測試套件</h1>
<div id="summary" class="running">⏳ 載入應用程式...</div>
<div id="results"></div>
<div id="frame-wrap"><iframe id="frame" src="index.html"></iframe></div>

<script>
(async () => {
  // ── Mini Test Runner ────────────────────────────────────────────────────────
  const suites = [];
  let currentSuite = null;

  function describe(name, fn) {
    const suite = { name, cases: [] };
    suites.push(suite);
    currentSuite = suite;
    fn();
    currentSuite = null;
  }

  function it(name, fn) {
    currentSuite.cases.push({ name, fn });
  }

  function assert(cond, msg) {
    if (!cond) throw new Error(msg || '斷言失敗');
  }
  function eq(a, b, msg) {
    if (a !== b) throw new Error(msg || `期望 ${JSON.stringify(b)}，但得到 ${JSON.stringify(a)}`);
  }
  function deepEq(a, b, msg) {
    if (JSON.stringify(a) !== JSON.stringify(b))
      throw new Error(msg || `期望 ${JSON.stringify(b)}，但得到 ${JSON.stringify(a)}`);
  }
  function notThrows(fn, msg) {
    try { fn(); } catch(e) { throw new Error(msg || `不應拋出錯誤: ${e.message}`); }
  }

  // ── 等待 iframe 載入 ────────────────────────────────────────────────────────
  const frame = document.getElementById('frame');
  await new Promise(resolve => {
    if (frame.contentDocument && frame.contentDocument.readyState === 'complete') return resolve();
    frame.addEventListener('load', resolve, { once: true });
  });
  // 給應用程式 JS 執行時間（DOMContentLoaded 後的初始化）
  await new Promise(r => setTimeout(r, 300));

  const W = frame.contentWindow;

  // const 宣告不掛到 window，用 inject script 方式暴露
  const exposeScript = W.document.createElement('script');
  exposeScript.textContent = `
    try {
      window.__habitTest = {
        DB, Hist, S, K, GistBackup, gistEncrypt, gistDecrypt,
        dateKey, pad, fmtDateTime, _nameToColor, makeInitialAvatar,
        cleanupEmptyScheduleDays, localISO, uid
      };
    } catch(e) { window.__habitTestErr = e.message; }
  `;
  W.document.body.appendChild(exposeScript);
  await new Promise(r => setTimeout(r, 50));

  if (W.__habitTestErr || !W.__habitTest) {
    document.getElementById('summary').textContent =
      `❌ 無法暴露 app 變數：${W.__habitTestErr || '未知錯誤'}（確認 index.html 在同目錄，且從 http://localhost 開啟）`;
    document.getElementById('summary').className = 'fail';
    return;
  }

  const { DB, Hist, S, K, GistBackup, gistEncrypt, gistDecrypt,
          dateKey, pad, fmtDateTime, _nameToColor, makeInitialAvatar,
          cleanupEmptyScheduleDays, localISO, uid } = W.__habitTest;

  // ── localStorage 快照 / 還原 ────────────────────────────────────────────────
  function lsSnap() {
    const snap = {};
    for (const k of Object.values(K)) snap[k] = W.localStorage.getItem(k);
    // also snap hist/autofocus
    snap[K.autofocus]  = W.localStorage.getItem(K.autofocus);
    snap['h_autofocus']= W.localStorage.getItem('h_autofocus');
    return snap;
  }
  function lsRestore(snap) {
    for (const [k, v] of Object.entries(snap)) {
      if (v === null) W.localStorage.removeItem(k);
      else W.localStorage.setItem(k, v);
    }
  }
  function lsClearApp() {
    for (const k of Object.values(K)) W.localStorage.removeItem(k);
    W.localStorage.removeItem('h_autofocus');
  }

  // 每個 test 用這個包裝：先清空，跑完後還原
  function withState(fn) {
    return async () => {
      const snap = lsSnap();
      lsClearApp();
      // Hist._stack / _idx 是讀 localStorage 的方法，清 localStorage 就等於重設
      // 不能直接賦值覆蓋方法
      try { await fn(); }
      finally { lsRestore(snap); }
    };
  }

  // 產生測試用習慣
  function mkHabit(overrides = {}) {
    return { id: uid(), name: '測試習慣', isFocus: false, groupId: null, createdAt: localISO(), ...overrides };
  }

  // 未來/過去日期：用 app 的 dateKey()（本地時區），避免 UTC 偏移造成誤差
  function futureDate(daysAhead = 1) {
    const d = new Date(); d.setDate(d.getDate() + daysAhead);
    return dateKey(d);
  }
  function pastDate(daysAgo = 1) {
    const d = new Date(); d.setDate(d.getDate() - daysAgo);
    return dateKey(d);
  }

  // ── 測試套件定義 ────────────────────────────────────────────────────────────

  // 1. 工具函式
  describe('工具函式', () => {
    it('pad: 個位數補零', () => {
      eq(pad(5), '05');
      eq(pad(10), '10');
      eq(pad(0), '00');
    });

    it('dateKey: 回傳 YYYY-MM-DD 格式', () => {
      const dk = dateKey();
      assert(/^\d{4}-\d{2}-\d{2}$/.test(dk), `格式錯誤: ${dk}`);
    });

    it('dateKey: 傳入 Date 物件', () => {
      const d = new Date('2025-01-15');
      const dk = dateKey(d);
      eq(dk, '2025-01-15');
    });

    it('fmtDateTime: 包含秒數', () => {
      const iso = '2026-06-24T23:24:05';
      const result = fmtDateTime(iso);
      assert(result.includes(':05'), `應包含秒數 :05，但得到: ${result}`);
      assert(result.includes('2026'), '應包含年份');
    });

    it('fmtDateTime: 時分秒都有補零', () => {
      const iso = '2026-01-05T09:08:07';
      const result = fmtDateTime(iso);
      assert(result.includes('09:08:07'), `應包含 09:08:07，但得到: ${result}`);
    });
  });

  // 2. makeInitialAvatar / _nameToColor
  describe('使用者頭像', () => {
    it('makeInitialAvatar 回傳合法 JSON', () => {
      const raw = makeInitialAvatar('譯賢');
      notThrows(() => JSON.parse(raw), '應是合法 JSON');
    });

    it('makeInitialAvatar 結構正確：type=initial, color, initial', () => {
      const d = JSON.parse(makeInitialAvatar('Kevin'));
      eq(d.type, 'initial');
      assert(typeof d.color === 'string' && d.color.startsWith('#'), 'color 應是十六進位色碼');
      eq(d.initial, 'K');
    });

    it('makeInitialAvatar 空名用 ?', () => {
      const d = JSON.parse(makeInitialAvatar(''));
      eq(d.initial, '?');
    });

    it('_nameToColor: 同名稱回傳相同顏色（確定性）', () => {
      eq(_nameToColor('Alice'), _nameToColor('Alice'));
    });

    it('_nameToColor: 不同名稱允許不同顏色', () => {
      // 不要求不同，只要它不崩潰
      notThrows(() => { _nameToColor('A'); _nameToColor('B'); _nameToColor(''); });
    });
  });

  // 3. DB 基本讀寫
  describe('DB — 基本讀寫', () => {
    it('DB.habits 預設回傳空陣列', withState(() => {
      deepEq(DB.habits(), []);
    }));

    it('DB.saveHabits / DB.habits 讀寫一致', withState(() => {
      const h = [mkHabit({ name: '跑步' })];
      DB.saveHabits(h);
      deepEq(DB.habits(), h);
    }));

    it('DB.scheds 預設回傳空物件', withState(() => {
      deepEq(DB.scheds(), {});
    }));

    it('DB.hmap 回傳 id→habit map', withState(() => {
      const h = mkHabit({ id: 'h1', name: '讀書' });
      DB.saveHabits([h]);
      eq(DB.hmap()['h1'].name, '讀書');
    }));

    it('DB.focusIds 只回傳 isFocus=true', withState(() => {
      DB.saveHabits([
        mkHabit({ id: 'f1', isFocus: true }),
        mkHabit({ id: 'f2', isFocus: false }),
      ]);
      const ids = DB.focusIds();
      assert(ids.has('f1'), 'f1 應在');
      assert(!ids.has('f2'), 'f2 不應在');
    }));
  });

  // 4. DB.setDay
  describe('DB.setDay — 排程去重', () => {
    it('重複 id 只保留第一筆', withState(() => {
      DB.setDay('2099-01-01', ['a', 'b', 'a', 'c', 'b']);
      deepEq(DB.scheds()['2099-01-01'], ['a', 'b', 'c']);
    }));

    it('空陣列可正常儲存', withState(() => {
      DB.setDay('2099-01-02', []);
      deepEq(DB.scheds()['2099-01-02'], []);
    }));
  });

  // 5. DB.getOrCreateDay
  describe('DB.getOrCreateDay — 重點培養自動注入', () => {
    it('新日期：自動填入重點培養習慣', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: true })]);
      const ids = DB.getOrCreateDay('2099-02-01');
      assert(ids.includes('f1'), '應包含重點培養 f1');
    }));

    it('已存在日期：把缺漏的重點培養習慣 prepend', withState(() => {
      DB.saveHabits([
        mkHabit({ id: 'f1', isFocus: true }),
        mkHabit({ id: 'f2', isFocus: true }),
      ]);
      // 先建立只有 f1 的日期
      DB.setDay('2099-02-02', ['f1', 'manual1']);
      // getOrCreateDay 應把 f2 prepend
      const ids = DB.getOrCreateDay('2099-02-02');
      assert(ids[0] === 'f2', 'f2 應在最前面');
      assert(ids.includes('f1'), 'f1 應保留');
      assert(ids.includes('manual1'), 'manual1 應保留');
    }));

    it('重點培養不重複注入', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: true })]);
      DB.getOrCreateDay('2099-02-03');
      const ids = DB.getOrCreateDay('2099-02-03');
      eq(ids.filter(x => x === 'f1').length, 1, 'f1 不應重複');
    }));

    it('無重點培養：回傳空陣列', withState(() => {
      DB.saveHabits([mkHabit({ id: 'h1', isFocus: false })]);
      const ids = DB.getOrCreateDay('2099-02-04');
      deepEq(ids, []);
    }));

    it('autofocus 記錄：自動注入的 id 有被記錄', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: true })]);
      DB.getOrCreateDay('2099-02-05');
      const af = DB.autofocus();
      assert((af['2099-02-05'] || []).includes('f1'), '應記錄自動注入');
    }));
  });

  // 6. DB.isDoneOnDay / addCompOnDay / removeComp
  describe('DB — 完成紀錄', () => {
    it('isDoneOnDay：完成後回傳 true', withState(() => {
      DB.saveHabits([mkHabit({ id: 'h1' })]);
      DB.addCompOnDay('h1', dateKey());
      assert(DB.isDoneOnDay('h1', dateKey()), '今天完成應為 true');
    }));

    it('isDoneOnDay：未完成回傳 false', withState(() => {
      assert(!DB.isDoneOnDay('nonexist', dateKey()), '未完成應為 false');
    }));

    it('addCompOnDay 非今天：eod 模式儲存 T23:59:59', withState(() => {
      S.set(K.comptime, 'eod');
      const dk = futureDate(1);
      DB.addCompOnDay('h1', dk);
      const comps = DB.comps();
      const c = comps.find(x => x.habitId === 'h1');
      assert(c, '應有 completion 記錄');
      assert(c.at.endsWith('T23:59:59'), `應是 T23:59:59，但得到 ${c.at}`);
    }));

    it('removeComp：移除最後一筆', withState(() => {
      DB.addCompOnDay('h1', dateKey());
      DB.removeComp('h1', dateKey());
      assert(!DB.isDoneOnDay('h1', dateKey()), '移除後應為 false');
    }));
  });

  // 7. DB.syncFocusChange — 重點培養移除邏輯（已知坑）
  describe('DB.syncFocusChange — 取消重點培養', () => {
    it('nowFocus=true 什麼都不做', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: true })]);
      const dk = futureDate(1);
      DB.setDay(dk, ['f1']);
      DB.syncFocusChange('f1', true);
      assert(DB.scheds()[dk].includes('f1'), '不應移除');
    }));

    it('nowFocus=false：自動注入且未完成 → 移除', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: false })]);
      const dk = futureDate(1);
      // 模擬被自動注入
      DB.addAutoFocus(dk, 'f1');
      DB.setDay(dk, ['f1', 'other']);
      DB.syncFocusChange('f1', false);
      const ids = DB.scheds()[dk];
      assert(!ids.includes('f1'), '自動注入且未完成應被移除');
      assert(ids.includes('other'), 'other 應保留');
    }));

    it('nowFocus=false：手動加入（非 autofocus）→ 保留', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: false })]);
      const dk = futureDate(1);
      // 手動加入，不呼叫 addAutoFocus
      DB.setDay(dk, ['f1', 'other']);
      DB.syncFocusChange('f1', false);
      const ids = DB.scheds()[dk];
      assert(ids.includes('f1'), '手動加入應保留');
    }));

    it('nowFocus=false：已完成 → 保留（即使是自動注入）', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: false })]);
      const dk = futureDate(1);
      DB.addAutoFocus(dk, 'f1');
      DB.setDay(dk, ['f1']);
      // 模擬已完成：手動加一筆 comp
      const c = DB.comps();
      c.push({ id: uid(), habitId: 'f1', at: dk + 'T12:00:00' });
      DB.saveComps(c);
      DB.syncFocusChange('f1', false);
      const ids = DB.scheds()[dk];
      assert(ids.includes('f1'), '已完成的應保留');
    }));

    it('nowFocus=false：今天以前的排程不受影響', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: false })]);
      const dk = pastDate(1);
      DB.addAutoFocus(dk, 'f1');
      const sc = DB.scheds(); sc[dk] = ['f1']; DB.saveScheds(sc);
      DB.syncFocusChange('f1', false);
      // 昨天的排程應不受影響（syncFocusChange 只處理 >= today）
      // 注意：today 本身也在範圍內
      // past 日期應保留
      assert((DB.scheds()[dk] || []).includes('f1'), '過去日期應保留');
    }));
  });

  // 8. DB.cleanupHabit
  describe('DB.cleanupHabit — 刪除習慣後清理排程', () => {
    it('從所有日期的排程中移除', withState(() => {
      DB.setDay('2099-03-01', ['h1', 'h2']);
      DB.setDay('2099-03-02', ['h1', 'h3']);
      DB.setDay('2099-03-03', ['h2', 'h3']);
      DB.cleanupHabit('h1');
      deepEq(DB.scheds()['2099-03-01'], ['h2']);
      deepEq(DB.scheds()['2099-03-02'], ['h3']);
      assert(!DB.scheds()['2099-03-01'].includes('h1'), 'h1 應被移除');
    }));

    it('不影響其他習慣', withState(() => {
      DB.setDay('2099-03-04', ['h1', 'h2', 'h3']);
      DB.cleanupHabit('h2');
      const ids = DB.scheds()['2099-03-04'];
      assert(ids.includes('h1'), 'h1 保留');
      assert(ids.includes('h3'), 'h3 保留');
    }));
  });

  // 9. cleanupEmptyScheduleDays — 排程頁切走時清理空日期（已知坑）
  describe('cleanupEmptyScheduleDays — 空日期清理', () => {
    it('移除未來的空日期', withState(() => {
      const dk = futureDate(2);
      DB.setDay(dk, []);
      cleanupEmptyScheduleDays();
      assert(!DB.scheds()[dk], '未來空日期應被移除');
    }));

    it('移除未來只有自動注入重點培養的日期', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: true })]);
      const dk = futureDate(3);
      DB.addAutoFocus(dk, 'f1');
      const sc = DB.scheds(); sc[dk] = ['f1']; DB.saveScheds(sc);
      cleanupEmptyScheduleDays();
      assert(!DB.scheds()[dk], '只有自動注入的未來日期應被移除');
    }));

    it('保留有手動加入習慣的未來日期', withState(() => {
      DB.saveHabits([mkHabit({ id: 'f1', isFocus: true })]);
      const dk = futureDate(4);
      // f1 是 autofocus，manual1 是手動加的
      DB.addAutoFocus(dk, 'f1');
      const sc = DB.scheds(); sc[dk] = ['f1', 'manual1']; DB.saveScheds(sc);
      cleanupEmptyScheduleDays();
      assert(DB.scheds()[dk], '有手動習慣的未來日期應保留');
    }));

    it('不移除今天', withState(() => {
      const today = dateKey();
      DB.setDay(today, []);
      cleanupEmptyScheduleDays();
      // 今天不在清理範圍（只清理 dk > today）
      // 有些實作包含今天，這裡確認行為符合原始碼（dk > today）
      // 原始碼: if(dk>today){...}
      assert(DB.scheds()[today] !== undefined, '今天不應被清理');
    }));

    it('不移除過去日期', withState(() => {
      const dk = pastDate(1);
      const sc = DB.scheds(); sc[dk] = []; DB.saveScheds(sc);
      cleanupEmptyScheduleDays();
      // 過去日期不在清理範圍
      assert(DB.scheds()[dk] !== undefined, '過去日期不應被清理');
    }));

    it('同時有多個未來空日期：全部清理', withState(() => {
      const dk1 = futureDate(1);
      const dk2 = futureDate(2);
      const dk3 = futureDate(3);
      DB.setDay(dk1, []);
      DB.setDay(dk2, []);
      DB.setDay(dk3, ['manual']); // 有手動，不清
      cleanupEmptyScheduleDays();
      assert(!DB.scheds()[dk1], 'dk1 應被清理');
      assert(!DB.scheds()[dk2], 'dk2 應被清理');
      assert(DB.scheds()[dk3], 'dk3 應保留');
    }));
  });

  // 10. Hist — Undo/Redo
  describe('Hist — 歷史快照', () => {
    it('DB.saveHabits 觸發 schedSnap（非 _snap 狀態下）', withState(async () => {
      Hist._snap = false;
      // Hist._stack() 是方法，讀 localStorage
      const beforeLen = Hist._stack().length;
      DB.saveHabits([mkHabit()]);
      // schedSnap 用 setTimeout 0，等它執行
      await new Promise(r => setTimeout(r, 80));
      const afterLen = Hist._stack().length;
      assert(afterLen > beforeLen, `快照數應增加：${beforeLen} → ${afterLen}`);
    }));

    it('_snap=true 時 DB.saveHabits 不觸發新快照', withState(async () => {
      // 先讓初始快照存進去
      DB.saveHabits([]);
      await new Promise(r => setTimeout(r, 80));
      const beforeLen = Hist._stack().length;
      Hist._snap = true;
      DB.saveHabits([mkHabit({ name: '_snap 測試' })]);
      await new Promise(r => setTimeout(r, 80));
      const afterLen = Hist._stack().length;
      Hist._snap = false;
      eq(afterLen, beforeLen, '_snap=true 不應新增快照');
    }));

    it('Hist.undo / redo / canUndo / canRedo 存在且可呼叫', () => {
      assert(typeof Hist.undo === 'function', 'undo 應存在');
      assert(typeof Hist.redo === 'function', 'redo 應存在');
      assert(typeof Hist.canUndo === 'function', 'canUndo 應存在');
      assert(typeof Hist.canRedo === 'function', 'canRedo 應存在');
    });

    it('canUndo：無快照時為 false', withState(() => {
      assert(!Hist.canUndo(), '空狀態不能 undo');
    }));

    it('快照上限 MAX=20', withState(async () => {
      Hist._snap = false;
      // 寫入 25 次，每次等 setTimeout(0) 執行
      for (let i = 0; i < 25; i++) {
        DB.saveHabits([mkHabit({ name: `step-${i}` })]);
        await new Promise(r => setTimeout(r, 30));
      }
      await new Promise(r => setTimeout(r, 100));
      const len = Hist._stack().length;
      assert(len <= Hist.MAX, `快照數應 ≤ ${Hist.MAX}，但有 ${len}`);
    }));

    it('Hist._idx() 讀 localStorage（方法，非屬性）', withState(() => {
      // 確認是 function 而不是數字

  // ── 測試用 timeout 保護 ──────────────────────────────────────────────────
  // 所有含 fetch/async 的網路測試加上 timeout，避免一個 hang 卡死全部
  function withTimeout(fn, ms = 7000) {
    return async () => {
      let timeoutId;
      const timeout = new Promise((_, reject) => {
        timeoutId = setTimeout(() => reject(new Error(`測試超時（${ms}ms）— 可能是 mock fetch 未正確 abort`)), ms);
      });
      try { await Promise.race([fn(), timeout]); }
      finally { clearTimeout(timeoutId); }
    };
  }

    it('mock fetch：signal.aborted 前置檢查確保已 abort 的 signal 能立即 reject', async () => {
      // 正確的 mock fetch 寫法：先檢查 .aborted，再 addEventListener
      function mockFetchWithAbort(url, opts) {
        return new Promise((resolve, reject) => {
          const sig = opts?.signal;
          if (sig?.aborted) return reject(new DOMException('Aborted', 'AbortError'));
          sig?.addEventListener('abort', () => reject(new DOMException('Aborted', 'AbortError')));
          // 永遠 pending（模擬 hang）
        });
      }
      const ctrl = new AbortController();
      ctrl.abort(); // 已 abort
      let errName = '';
      try { await mockFetchWithAbort('http://x', { signal: ctrl.signal }); }
      catch(e) { errName = e.name; }
      eq(errName, 'AbortError', '前置檢查 .aborted 確保已 abort 的 signal 正確處理');
    });

    it('abort 後 pending 的 mock fetch 正確中斷', withTimeout(async () => {
      const ctrl = new AbortController();
      let rejected = false;
      const p = new Promise((_, reject) => {
        const sig = ctrl.signal;
        if (sig.aborted) return reject(new DOMException('Aborted', 'AbortError'));
        sig.addEventListener('abort', () => reject(new DOMException('Aborted', 'AbortError')));
      }).catch(e => { if (e.name === 'AbortError') rejected = true; });
      ctrl.abort();
      await p;
      assert(rejected, 'abort 後 pending promise 應被 reject');
    }));
  });

  const resultsEl = document.getElementById('results');
  for (const { suite, cases } of suiteDoms) {
    const suitePass = cases.filter(c => c.ok).length;
    const suiteFail = cases.length - suitePass;
    const el = document.createElement('div');
    el.className = 'suite';
    el.innerHTML = `<div class="suite-title">${suite}
      <span class="badge pass">${suitePass} 通過</span>
      ${suiteFail ? `<span class="badge fail">${suiteFail} 失敗</span>` : ''}
    </div>`;
    for (const c of cases) {
      const row = document.createElement('div');
      row.className = 'case ' + (c.ok ? 'pass' : 'fail');
      row.innerHTML = `<span class="icon">${c.ok ? '✓' : '✗'}</span>
        <div><div class="name">${c.name}</div>
        ${c.err ? `<div class="err">${c.err}</div>` : ''}</div>`;
      el.appendChild(row);
    }
    resultsEl.appendChild(el);
  }
})();
</script>
</body>
</html>
