          DB.saveHabits(DB.habits().filter(h=>!idSet.has(h.id)));
          idle.forEach(h=>DB.cleanupHabit(h.id));showToast(`已清除 ${idle.length} 個閒置習慣`);self.render();
        });
      });
      cont.appendChild(cleanBtn);
    },
    makeGroupSection(g,habitList,self){
      const sec=document.createElement('div');sec.className='group-section';sec.dataset.gid=g.id;sec.dataset.id=g.id;
      const hdr=document.createElement('div');hdr.className='group-header';
      hdr.innerHTML=`<span class="group-header-drag">${SVG.hgrip}</span><span class="group-label">${g.name}</span><div class="group-line"></div><div class="group-actions"><button class="group-action-btn" data-ren>改名</button><button class="group-action-btn" data-del style="color:var(--danger)">刪除</button></div>`;
      hdr.querySelector('[data-ren]').addEventListener('click',e=>{
        e.stopPropagation();
        showModal('更改群組名稱','新名稱',name=>{
          Hist.label(`重新命名群組「${g.name}」→「${name}」`);const all=DB.groups();const idx=all.findIndex(x=>x.id===g.id);
          if(idx!==-1){all[idx].name=name;DB.saveGroups(all);showToast(`群組已更名為「${name}」`)}self.render();
        },g.name);
      });
      hdr.querySelector('[data-del]').addEventListener('click',e=>{
        e.stopPropagation();
        showConfirm(`刪除群組「${g.name}」？`,`群組內習慣將移至未分類`,()=>{
          Hist.label(`刪除群組「${g.name}」`);const ah=DB.habits();ah.filter(h=>h.groupId===g.id).forEach(h=>h.groupId=null);DB.saveHabits(ah);
          DB.saveGroups(DB.groups().filter(x=>x.id!==g.id));showToast(`已刪除群組「${g.name}」`);self.render();
        });
      });
      sec.appendChild(hdr);
      const items=document.createElement('div');items.className='group-items';
      habitList.sort((a,b)=>(a.groupOrder||0)-(b.groupOrder||0)).forEach(h=>items.appendChild(self.makeHabitItem(h,self)));
      sec.appendChild(items);return sec;
    },
    makeHabitItem(h,self){
      const div=document.createElement('div');
      div.className=`mgmt-item${h.isFocus?' is-focus':''}`;div.dataset.id=h.id;
      div.innerHTML=`
        <div class="habit-row">
          <span class="drag-handle">${SVG.grip}</span>
          <span class="mgmt-name">${h.name}</span>
          <button class="focus-toggle${h.isFocus?' on':''}">${h.isFocus?'重點培養 ✓':'重點培養'}</button>
          <button class="del-btn">${SVG.x}</button>
        </div>
      `;
      // inline name edit
      div.querySelector('.mgmt-name').addEventListener('click',()=>{
        const nameEl=div.querySelector('.mgmt-name');
        const inp=document.createElement('input');inp.className='mgmt-name-input';inp.value=h.name;
        nameEl.replaceWith(inp);inp.focus();inp.select();
        function save(){const v=inp.value.trim();if(v&&v!==h.name){Hist.label(`重新命名「${h.name}」→「${v}」`);const all=DB.habits();const idx=all.findIndex(x=>x.id===h.id);if(idx!==-1){all[idx].name=v;DB.saveHabits(all);showToast(`已更名為「${v}」`)}}self.render()}
        inp.addEventListener('blur',save);
        inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=h.name;inp.blur()}});
      });
      // focus toggle
      div.querySelector('.focus-toggle').addEventListener('click',()=>{
        const all=DB.habits();const idx=all.findIndex(x=>x.id===h.id);
        if(idx!==-1){const nowFocus=!all[idx].isFocus;Hist.label(`${nowFocus?'設為':'取消'}重點培養「${h.name}」`);all[idx].isFocus=nowFocus;DB.saveHabits(all);DB.syncFocusChange(h.id,nowFocus);showToast(nowFocus?`「${h.name}」設為重點培養`:`「${h.name}」取消重點培養`);}
        self.render();
      });
      // delete
      div.querySelector('.del-btn').addEventListener('click',()=>{
        const hasRef=isHabitReferenced(h.id);
        if(!hasRef){
          Hist.label(`刪除習慣「${h.name}」`);
          DB.saveHabits(DB.habits().filter(x=>x.id!==h.id));
          DB.cleanupHabit(h.id);showToast(`已刪除「${h.name}」`);self.render();
        }else{
          showConfirm(`刪除「${h.name}」？`,`排程與統計將一併移除`,()=>{
            Hist.label(`刪除習慣「${h.name}」`);DB.saveHabits(DB.habits().filter(x=>x.id!==h.id));
            DB.cleanupHabit(h.id);showToast(`已刪除「${h.name}」`);self.render();
          });
        }
      });
      return div;
    }
  },

  // SETTINGS
  settings:{
    render(){} // buttons wired once in showApp
  }
};

// ══ CLEANUP ══
function cleanupEmptyScheduleDays(){
  const today=dateKey();const sc=DB.scheds();const af=DB.autofocus();let changed=false;
  Object.keys(sc).forEach(dk=>{
    if(dk>today){
      const ids=sc[dk]||[];
      // remove days that are empty OR contain only auto-injected focus habits
      if(ids.length===0||ids.every(id=>(af[dk]||[]).includes(id))){delete sc[dk];changed=true;}
    }
  });
  if(changed)DB.saveScheds(sc);
}

// ══ ROUTER ══
const Router={
  current:null,
  go(page){
    // leaving schedule → cleanup empty days
    if(this.current==='schedule'&&page!=='schedule')cleanupEmptyScheduleDays();
    // leaving home → reset viewDate
    if(page==='home')viewDate=dateKey();
    this.current=page;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.page===page));
    // sort-chips: park in stats page, hoist to header when on stats tab
    const ahRight=document.getElementById('ah-right');
    const sortChips=document.getElementById('stats-sort-chips');
    if(ahRight.contains(sortChips)){
      sortChips.style.visibility='hidden';sortChips.style.position='absolute';
      document.getElementById('page-stats').appendChild(sortChips);
    }
    ahRight.replaceChildren();
    if(page==='stats'){
      sortChips.style.visibility='';sortChips.style.position='';
      ahRight.appendChild(sortChips);
    }
    Pages[page].render();
    updateUndoBtns();
  }
};

// ══ BOOT ══
async function boot(){
  initTheme();
  const yr=new Date().getFullYear();document.querySelectorAll('.cp-year').forEach(el=>el.textContent=yr);
  if(Auth.isLoggedIn()){showApp();return}
  const pw1=document.getElementById('pw1'),pw2=document.getElementById('pw2'),
    btn=document.getElementById('pw-btn'),err=document.getElementById('pw-err');
  const isSetup=Auth.isSetup();
  if(!isSetup){document.getElementById('auth-title').textContent='歡迎';document.getElementById('auth-sub').textContent='首次使用，請設定密碼';pw2.style.display='block';btn.textContent='設定密碼';}
  document.getElementById('auth-screen').style.display='flex';setTimeout(()=>pw1.focus(),100);
  async function submit(){
    err.textContent='';const p=pw1.value;if(!p){err.textContent='請輸入密碼';return}
    if(!isSetup){
      if(pw2.value!==p){err.textContent='兩次密碼不一致';return}
      if(p.length<4){err.textContent='密碼至少 4 個字元';return}
      await Auth.setup(p);showApp();
    } else {const ok=await Auth.login(p);if(ok)showApp();else{err.textContent='密碼錯誤';pw1.value='';pw1.focus()}}
  }
  btn.addEventListener('click',submit);
  [pw1,pw2].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')submit()}));
}


function updateUndoBtns(){
  const u=document.getElementById('undo-btn'),r=document.getElementById('redo-btn');
  if(u)u.disabled=!Hist.canUndo();
  if(r)r.disabled=!Hist.canRedo();
}

function showApp(){
  updateThemeBtn();

  // Nav tabs
  document.querySelectorAll('.nav-tab').forEach(tab=>tab.addEventListener('click',()=>Router.go(tab.dataset.page)));

  // Theme toggle
  document.getElementById('theme-btn').addEventListener('click',toggleTheme);

  // Settings button (header)
  document.getElementById('settings-btn').addEventListener('click',()=>Router.go('settings'));

  // Undo / Redo
  Hist.init();
  document.getElementById('undo-btn').addEventListener('click',()=>{Hist.undo();});
  document.getElementById('redo-btn').addEventListener('click',()=>{Hist.redo();});
  document.addEventListener('keydown',e=>{
    if(e.metaKey||e.ctrlKey){
      if(e.key==='z'){e.preventDefault();if(e.shiftKey)Hist.redo();else Hist.undo();}
    }
  });
  updateUndoBtns();

  // Date nav (home review)
  document.getElementById('date-prev').addEventListener('click',()=>{
    const d=new Date((viewDate||dateKey())+'T12:00:00');
    d.setDate(d.getDate()-1);viewDate=dateKey(d);Pages.home.render();
  });
  document.getElementById('date-next').addEventListener('click',()=>{
    const today=dateKey();if((viewDate||today)>=today)return;
    const d=new Date(viewDate+'T12:00:00');
    d.setDate(d.getDate()+1);viewDate=dateKey(d);Pages.home.render();
  });
  // Home date picker — overlaid inside #home-date
  // iOS: 直接點到 input 就開日曆；桌面: click handler 呼叫 showPicker()
  const homeDatePicker=document.getElementById('home-date-picker');
  homeDatePicker.max=dateKey();
  homeDatePicker.addEventListener('click',()=>{try{homeDatePicker.showPicker()}catch(e){}});
  homeDatePicker.addEventListener('change',()=>{
    if(!homeDatePicker.value)return;
    viewDate=homeDatePicker.value;homeDatePicker.value='';Pages.home.render();
  });

  // Schedule date picker — overlaid inside wrapper
  const datePicker=document.getElementById('date-picker');
  datePicker.min=dateKey();
  datePicker.addEventListener('click',()=>{try{datePicker.showPicker()}catch(e){}});
  datePicker.addEventListener('change',()=>{if(!datePicker.value)return;Hist.label(`新增排程日期 ${datePicker.value}`);DB.getOrCreateDay(datePicker.value);showToast(`已新增 ${datePicker.value} 排程`);datePicker.value='';Router.go('schedule')});

  // New habit
  const ni=document.getElementById('new-habit-input'),nb=document.getElementById('new-habit-btn');
  function addNewHabit(){
    const name=ni.value.trim();if(!name)return;
    if(DB.habits().find(h=>h.name===name)){showAlert('已有相同名稱','請使用不同的習慣名稱');return}
    Hist.label(`新增習慣「${name}」`);const all=DB.habits();all.push(createHabit(name));DB.saveHabits(all);ni.value='';showToast(`已新增「${name}」`);Pages.habits.render();
  }
  nb.addEventListener('click',addNewHabit);ni.addEventListener('keydown',e=>{if(e.key==='Enter')addNewHabit()});

  // Settings export / import
  // ── 補打時間設定 ──
  function updateComptimeBtns(){
    const cur=S.get(K.comptime,'eod');
    document.querySelectorAll('.comptime-opt').forEach(btn=>{
      const active=btn.dataset.val===cur;
      btn.style.background=active?'var(--accent)':'var(--bg)';
      btn.style.color=active?'#fff':'var(--sub)';
      btn.style.borderColor=active?'var(--accent)':'var(--border)';
    });
  }
  document.querySelectorAll('.comptime-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.set(K.comptime,btn.dataset.val);
      updateComptimeBtns();
      showToast(btn.dataset.val==='eod'?'補打時間：當天最後（23:59:59）':'補打時間：當下時間');
    });
  });
  updateComptimeBtns();

  document.getElementById('export-btn').addEventListener('click',()=>{
    const data={version:1,exportedAt:localISO(),habits:DB.habits(),groups:DB.groups(),comps:DB.comps(),scheds:DB.scheds()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`習慣養成_${dateKey()}.json`;a.click();URL.revokeObjectURL(url);
  });
  const importFile=document.getElementById('import-file');
  document.getElementById('import-btn').addEventListener('click',()=>importFile.click());
  importFile.addEventListener('change',()=>{
    const file=importFile.files[0];if(!file)return;
    importFile.value='';
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.habits||!Array.isArray(data.habits)){showAlert('格式錯誤','請選擇正確的習慣養成備份檔案');return;}
        showConfirm('確認覆蓋資料？','現有的所有習慣、排程與統計將被取代，無法復原。',()=>{
          Hist.label('載入備份資料');if(data.habits)DB.saveHabits(data.habits);
          if(data.groups)DB.saveGroups(data.groups);
          if(data.comps)DB.saveComps(data.comps);
          if(data.scheds)DB.saveScheds(data.scheds);
          showAlert('載入成功','資料已還原，畫面即將重新整理。');
          setTimeout(()=>location.reload(),1200);
        },{okText:'覆蓋',okClass:'modal-danger'});
      }catch{showAlert('格式錯誤','無法讀取檔案，請確認為正確的 JSON 格式');}
    };
    reader.readAsText(file);
  });

  // ── Gist 備份 UI ──
  const gistTokenInp=document.getElementById('gist-token-inp');
  const gistStatusEl=document.getElementById('gist-status');
  function setGistStatus(msg,type=''){gistStatusEl.textContent=msg;gistStatusEl.className='gist-status'+(type?' '+type:'');}
  function refreshGistStatus(){
    const t=GistBackup.token();const gid=GistBackup.gistId();const at=GistBackup.backedAt();
    if(t)gistTokenInp.value=t;
    if(at)setGistStatus('上次備份：'+fmtDateTime(at)+(gid?' · Gist '+gid.slice(0,7):''),'ok');
    else if(t)setGistStatus('已設定 Token，尚未備份');
    else setGistStatus('');
  }
  gistTokenInp.addEventListener('change',()=>{GistBackup.setToken(gistTokenInp.value.trim());refreshGistStatus();updateGistIndicator();});
  document.getElementById('gist-push-btn').addEventListener('click',async()=>{
    const t=gistTokenInp.value.trim();if(t)GistBackup.setToken(t);
    if(!GistBackup.token()){setGistStatus('請先輸入 GitHub Token','err');return;}
    setGistStatus('備份中…');
    try{
      await _doGistPush({throw:true});
      const gid=GistBackup.gistId();
      setGistStatus('備份成功'+(gid?' · Gist '+gid.slice(0,7):''),'ok');
    }catch(e){setGistStatus('備份失敗：'+e.message,'err');}
  });
  document.getElementById('gist-pull-btn').addEventListener('click',()=>{
    if(!GistBackup.token()){setGistStatus('請先輸入 GitHub Token','err');return;}
    showConfirm('從 Gist 還原？','⚠ 現有資料將被覆蓋，無法復原。',async()=>{
      setGistStatus('還原中…');
      try{const at=await GistBackup.pull();setGistStatus('還原成功，備份時間：'+fmtDateTime(at),'ok');showAlert('還原成功','畫面即將重新整理。');setTimeout(()=>location.reload(),1200);}
      catch(e){setGistStatus('還原失敗：'+e.message,'err');}
    },{okText:'覆蓋還原',okClass:'modal-danger'});
  });
  refreshGistStatus();

  // ── Gist Sync 狀態指示器 ──
  const _SVG_SYNC=`<svg class="gist-spin-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>`;
  const _SVG_CLOUD=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path stroke="var(--sub)" d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/><polyline stroke="#5cb88a" stroke-width="2.2" points="9.5 12.5 11.5 14.5 15.5 10.5"/></svg>`;
  const _SVG_ERR=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path stroke="var(--danger)" d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/><line stroke="var(--danger)" stroke-width="2.2" x1="12" y1="12" x2="12" y2="15"/><circle fill="var(--danger)" cx="12" cy="17.5" r=".8"/></svg>`;
  let _gistSyncing=false;
  let _gistErrMsg='';
  let _gistLastDuration='';
  function updateGistIndicator(){
    const ind=document.getElementById('gist-indicator');
    const btn=document.getElementById('gist-sync-btn');
    const tip=document.getElementById('gist-tooltip');
    if(!ind||!btn||!tip)return;
    if(!GistBackup.token()){ind.style.display='none';return;}
    ind.style.display='flex';
    const at=GistBackup.backedAt();
    const timeStr=at?'<span style="color:#5cb88a">✓</span> 上次成功同步：'+fmtDateTime(at):'尚未同步';
    if(_gistSyncing){
      btn.innerHTML=_SVG_SYNC;
      tip.innerHTML=(at?timeStr+'<br>':'')+'<span style="color:var(--accent)">同步中…</span>';
    }else if(_gistErrMsg){
      btn.innerHTML=_SVG_ERR;
      tip.innerHTML=(at?timeStr+'<br>':'')+'<span style="color:var(--danger)">備份失敗：'+_gistErrMsg+'</span>';
    }else{
      btn.innerHTML=_SVG_CLOUD;
      tip.innerHTML=timeStr+(_gistLastDuration?'<br><span style="color:var(--sub);font-size:11px">耗時 '+_gistLastDuration+'</span>':'');
    }
  }
  updateGistIndicator();
  // 點擊切換 tooltip（mobile 無 hover）
  document.getElementById('gist-sync-btn').addEventListener('click',()=>{
    const ind=document.getElementById('gist-indicator');
    ind.classList.toggle('open');
    setTimeout(()=>ind.classList.remove('open'),2800);
  });

  async function _doGistPush(opts={}){
    // opts: { silent, throw }
    if(!GistBackup.token()||!navigator.onLine)return;
    // Bug B fix: 手動備份也要防止並發
    if(_gistSyncing&&!opts.throw)return;
    if(_gistSyncing&&opts.throw)throw new Error('同步中，請稍候');
    if(!opts.throw)_gistLastAttempt=Date.now();
    const _t0=Date.now();
    _gistSyncing=true; _gistErrMsg=''; _gistLastDuration=''; updateGistIndicator();
    // Bug A fix: 30 秒 timeout，防止 fetch 永遠 pending
    const ctrl=new AbortController();
    const _tout=setTimeout(()=>ctrl.abort(),30000);
    try{
      await GistBackup.push(ctrl.signal);
      clearTimeout(_tout);
      _gistLastDuration=((Date.now()-_t0)/1000).toFixed(1)+'s';
      _gistDirty=false;
      if(!opts.silent)showToast('Gist 備份成功');
      refreshGistStatus();
      _gistErrMsg='';
    }catch(e){
      clearTimeout(_tout);
      _gistErrMsg=e.name==='AbortError'?'連線逾時（30s）':e.message;
      console.warn('Gist push failed:',_gistErrMsg);
      _gistSyncing=false; updateGistIndicator();
      if(opts.throw)throw new Error(_gistErrMsg); else return;
    }
    _gistSyncing=false; updateGistIndicator();
  }

  // 自動備份：debounce 60s，且兩次嘗試（不論成敗）最短間隔 5 分鐘
  const GIST_MIN_INTERVAL = 5 * 60 * 1000; // 5 min
  let _gistAutoTimer;
  let _gistLastAttempt = 0;
  let _gistDirty = false; // 資料有變動才為 true，push 成功後清掉
  function _canAutoPush(){
    if(!GistBackup.token()||!navigator.onLine||_gistSyncing)return false;
    if(!_gistDirty)return false; // 資料沒變動，不推
    return Date.now()-_gistLastAttempt > GIST_MIN_INTERVAL;
  }
  function scheduleAutoGist(){
    if(!GistBackup.token()||!navigator.onLine)return;
    clearTimeout(_gistAutoTimer);
    _gistAutoTimer=setTimeout(()=>{if(_canAutoPush())_doGistPush({silent:true});},60000);
  }
  // 離開時備份（visibilitychange + blur 共用同一個保護）
  function _onLeave(){
    if(!_canAutoPush())return;
    clearTimeout(_gistAutoTimer);
    _doGistPush({silent:true});
  }
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')_onLeave();});
  window.addEventListener('blur',_onLeave);
  // Bug C fix: 重新連網時，若有未推送資料立即補推
  window.addEventListener('online',()=>{if(_canAutoPush())_doGistPush({silent:true});});
  ['saveHabits','saveGroups','saveComps','saveScheds'].forEach(m=>{
    const orig=DB[m].bind(DB);
    DB[m]=function(...a){orig(...a);_gistDirty=true;scheduleAutoGist();};
  });

  // 延一幀讓 iOS 算完 env(safe-area-inset-bottom) 再顯示，避免底部 bar 位置跳動
  // Settings page: profile section
  document.getElementById('settings-edit-profile-btn').addEventListener('click',()=>showProfileModal(false));
  updateSettingsProfile();

  // Header avatar
  updateUserAvBtn();
  document.getElementById('user-av-btn').addEventListener('click',()=>showProfileModal(false));

  requestAnimationFrame(()=>{
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('bottom-nav').style.display='flex';
    document.getElementById('app-header').style.display='flex';
    // 初始 render 可能觸發 DB 寫入（如 getOrCreateDay），用 _snap 擋住不產生快照
    Hist._snap=true;
    Router.go('home');
    Hist._snap=false;
    clearTimeout(Hist._timer);
    // 全新安裝才建 baseline；已有歷史則保留（跨 session undo/redo 繼續有效）
    if(Hist._stack().length===0)Hist._snapshot();
    updateUndoBtns();
    // 首次使用：若無使用者名稱，提示設定
    if(!S.get(K.userName,''))setTimeout(()=>showProfileModal(true),400);
  });
}

// iOS 鍵盤彈出時動態調整 body padding，讓 dropdown 不被遮住
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    const kbH=Math.max(0,window.innerHeight-window.visualViewport.height);
    document.body.style.paddingBottom=kbH>0
      ?`calc(${kbH}px + var(--nav) + env(safe-area-inset-bottom))`
      :`calc(var(--nav) + env(safe-area-inset-bottom))`;
  });
}

boot();
</script>
