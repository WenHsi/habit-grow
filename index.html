<style>
/* ── Variables ── */
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --border: #E9E5DE;
  --text: #2A2826;
  --sub: #9C9890;
  --accent: #6B9E8B;
  --accent-bg: #EBF3F0;
  --accent-border: #C8DEDB;
  --done: #C4C0B8;
  --done-bg: #F3F2EF;
  --danger: #C96C62;
  /* focus habit — warm orangey-yellow */
  --focus-bg: #FDF6E3;
  --focus-border: #F0D090;
  --focus-line: #D4980A;
  --focus-chip-bg: rgba(212,152,10,.13);
  --focus-chip-text: #9A7000;
  --r: 10px;
  --nav: 58px;
  --header: 50px;
  --sh: 0 1px 4px rgba(0,0,0,.07);
  --bg-header: rgba(247,246,243,.94);
  --bg-nav: rgba(255,255,255,.95);
}

[data-theme="dark"] {
  /* ── 底色：炭黑，幾乎無色偏 ── */
  --bg: #17171c;
  --surface: #1e1e23;
  --border: #2a2a30;
  /* ── 文字 ── */
  --text: #E4E4E8;
  --sub: #666672;
  /* ── 主色：鼠尾草綠 ── */
  --accent: #7DB5A2;
  --accent-bg: #0d1e1c;
  --accent-border: #1a3830;
  /* ── 完成態 ── */
  --done: #2C2C38;
  --done-bg: #0b0b0e;
  /* ── 警示 ── */
  --danger: #E05868;
  /* ── 重點培養：金星暖黃 ── */
  --focus-bg: #14100a;
  --focus-border: #3a2c10;
  --focus-line: #F0B030;
  --focus-chip-bg: rgba(240,176,48,.16);
  --focus-chip-text: #F0C040;
  /* ── 陰影 / 模糊底層 ── */
  --sh: inset 0 -0.5px 0 rgba(255,255,255,.06), 0 2px 14px rgba(0,0,0,.65);
  --bg-header: rgba(10,10,13,.95);
  --bg-nav: rgba(11,11,15,.97);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
body { font-family: -apple-system,'PingFang TC','Noto Sans TC',sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; overflow-x: hidden; padding-bottom: calc(var(--nav) + env(safe-area-inset-bottom)); }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input, select { font: inherit; border: none; outline: none; color: var(--text); }
@media (max-width: 767px) { input, textarea, select { font-size: 16px !important; } }

/* ── Auth ── */
#auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 40px 32px; z-index: 300; }
.auth-logo { font-size: 40px; }
.auth-title { font-size: 22px; font-weight: 700; }
.auth-sub { font-size: 14px; color: var(--sub); text-align: center; }
.auth-form { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin-top: 6px; }
.auth-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 9px; background: var(--surface); transition: border-color .15s; }
.auth-input:focus { border-color: var(--accent); }
.auth-btn { padding: 12px; background: var(--accent); color: #fff; border-radius: 9px; font-size: 15px; font-weight: 600; transition: opacity .15s; }
.auth-btn:active { opacity: .8; }
.auth-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 18px; }

/* ── App Header ── */
.app-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: calc(var(--header) + env(safe-area-inset-top)); padding-top: env(safe-area-inset-top); padding-left: 16px; padding-right: 16px; background: var(--bg-header); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); z-index: 200; align-items: center; gap: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.05); }
.ah-brand { display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0; }
.ah-wordmark { font-size: 18px; font-weight: 700; letter-spacing: -.01em; line-height: 1; color: var(--text); text-decoration: none; }
.ah-wordmark em { font-style: normal; color: var(--accent); }
.ah-by { font-size: .52rem; font-family: 'DM Mono', monospace; color: var(--sub); letter-spacing: .06em; text-decoration: none; transition: color .15s; line-height: 1; margin-top: 5px; }
.ah-by:hover { color: var(--text); }
.ah-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

/* ── Layout ── */
#app { display: none; }
.page { display: none; padding: calc(var(--header) + env(safe-area-inset-top) + 16px) 16px 16px; min-height: calc(100dvh - var(--nav) - env(safe-area-inset-bottom)); }
.page.active { display: block; }
.page-sub { font-size: 13px; color: var(--sub); margin-bottom: 16px; margin-top: -8px; }

/* ── Bottom Nav ── */
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--nav) + min(env(safe-area-inset-bottom), 16px)); padding-bottom: min(env(safe-area-inset-bottom), 16px); background: var(--bg-nav); backdrop-filter: blur(12px); border-top: 1px solid var(--border); box-shadow: 0 -1px 10px rgba(0,0,0,.05); z-index: 100; align-items: stretch; }
.nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--sub); font-size: 10px; letter-spacing: .02em; transition: color .15s; }
.nav-tab svg { width: 22px; height: 22px; }
.nav-tab.active { color: var(--accent); }

/* ── Section Label ── */
.sec-label { font-size: 11px; font-weight: 600; color: var(--sub); letter-spacing: .08em; text-transform: uppercase; padding: 0 3px; margin: 18px 0 7px; }
.sec-label:first-child { margin-top: 0; }

/* ── Slot Items ── */
.slot-list { display: flex; flex-direction: column; gap: 4px; }
.slot-item { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh); border: 1px solid var(--border); display: flex; align-items: center; gap: 9px; padding: 9px 11px; user-select: none; -webkit-user-select: none; transition: opacity .15s; }
.slot-item.done { background: var(--done-bg); border-color: transparent; box-shadow: none; }
[data-theme="dark"] .slot-item.done { border-color: var(--border); }
.slot-item.done .slot-name { color: var(--done); text-decoration: line-through; }
.slot-item.is-focus { border-left: 3px solid var(--focus-line); }
.slot-item.is-focus.done { border-left-color: var(--done); }
.slot-item.is-dragging { opacity: .35; }

/* ── Drag ── */
.drag-handle { color: #D5D1C8; cursor: grab; display: flex; align-items: center; flex-shrink: 0; padding: 2px; touch-action: none; }
.drag-handle:active { cursor: grabbing; color: var(--sub); }
.slot-item.is-focus .drag-handle { color: var(--sub); }
.drag-ghost { position: fixed; pointer-events: none; z-index: 999; background: var(--surface); border-radius: var(--r); box-shadow: 0 6px 24px rgba(0,0,0,.15); border: 1px solid var(--border); display: flex; align-items: center; gap: 9px; padding: 9px 11px; opacity: .96; }

/* ── Check Button ── */
.check-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
.check-btn.on { background: var(--accent); border-color: var(--accent); }
.check-btn svg { opacity: 0; transition: opacity .15s; }
.check-btn.on svg { opacity: 1; }
.slot-item.is-focus .check-btn { border-color: var(--border); }
.slot-name-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; overflow: hidden; }
.slot-name-wrap .slot-name { flex: unset; }
.slot-parent-tag { font-size: 11px; color: var(--sub); line-height: 1; pointer-events: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
.slot-list .group-section { /* no extra margin */ }
.slot-list .group-items { display: flex; flex-direction: column; gap: 0; }
.slot-item.nest-candidate { outline: 2px dashed var(--accent); outline-offset: -2px; background: var(--accent-bg); }

/* ── Slot Name / Actions ── */
.slot-name { flex: 1; font-size: 15px; cursor: pointer; border-radius: 4px; padding: 1px 3px; transition: background .12s; }
.slot-name:hover { background: rgba(0,0,0,.05); }
.slot-item.done .slot-name { cursor: default; }
.slot-replace-input { flex: 1; padding: 3px 6px; border: 1.5px solid var(--accent); border-radius: 6px; font-size: 14px; background: var(--surface); }
.slot-time { font-size: 12px; color: var(--sub); flex-shrink: 0; cursor: pointer; }
.slot-time:hover { opacity: .7; }
.restore-btn { font-size: 12px; color: var(--sub); padding: 2px 7px; border-radius: 6px; }
.restore-btn:active { background: var(--border); }
.rm-slot-btn { color: var(--sub); opacity: .4; padding: 3px 5px; font-size: 17px; line-height: 1; flex-shrink: 0; transition: opacity .15s; }
.rm-slot-btn:hover { opacity: 1; color: var(--danger); }

/* ── Autocomplete ── */
.ac-wrap { position: relative; margin-top: 5px; }
.ac-input { width: 100%; padding: 9px 12px; border: 1.5px dashed var(--border); border-radius: 8px; background: transparent; font-size: 14px; color: var(--sub); transition: all .15s; }
.ac-input::placeholder { color: var(--done); }
.ac-input:focus { border-color: var(--accent); border-style: solid; color: var(--text); }
.ac-dropdown, .slot-replace-dd { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,.1); z-index: 150; overflow: hidden; max-height: 220px; overflow-y: auto; }
.slot-replace-dd { top: 100%; margin-top: 2px; }
.ac-item { padding: 9px 14px; font-size: 14px; cursor: pointer; transition: background .1s; }
.ac-item.hl { background: var(--accent-bg); }
.ac-item.new { color: var(--accent); }
.ac-item-sub { display: block; font-size: 11px; color: var(--sub); margin-top: 1px; }

/* ── Focus Display ── */
.focus-box { margin-top: 14px; padding: 12px 14px; background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); border-left: 4px solid var(--focus-line); box-shadow: var(--sh); }
.focus-box-title { font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: .07em; margin-bottom: 7px; }
.focus-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.focus-chip { font-size: 13px; background: var(--focus-chip-bg); color: var(--text); padding: 4px 11px; border-radius: 20px; font-weight: 500; }

/* ── Upcoming ── */
.upcoming-day-block { margin-top: 14px; }
.upcoming-date-header { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 5px; padding: 0 2px; }
.upcoming-slots .slot-item { font-size: 13px; padding: 6px 10px; color: var(--sub); box-shadow: none; }
.upcoming-slots .slot-item .slot-name { font-size: 13px; }

/* ── Add Date ── */
.add-date-btn { width: 100%; padding: 11px; border: 1.5px dashed var(--border); border-radius: 9px; color: var(--sub); font-size: 14px; text-align: center; cursor: pointer; transition: all .15s; background: transparent; margin-top: 8px; }
.add-date-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Schedule Day Block ── */
.sched-day { margin-bottom: 22px; }
.sched-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.sched-day-label { font-size: 13px; font-weight: 700; }
.remove-day-btn { font-size: 12px; color: var(--sub); }

/* ── Stats ── */
.sort-chips { display: flex; gap: 6px; }
.sort-chip { padding: 4px 11px; border-radius: 20px; border: 1.5px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--sub); transition: all .15s; }
.sort-chip.on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.stat-item { background: var(--surface); border-radius: var(--r); box-shadow: var(--sh); border: 1px solid var(--border); overflow: hidden; margin-bottom: 4px; }
.stat-item.is-focus { border-left: 3px solid var(--focus-line); }
.stat-row { display: flex; align-items: center; padding: 11px 14px; cursor: pointer; gap: 10px; }
.stat-name { flex: 1; font-size: 15px; }
.stat-parent-name { display: flex; align-items: center; gap: 5px; }
.stat-count { font-size: 13px; color: var(--sub); }
.stat-chev { color: var(--sub); transition: transform .2s; flex-shrink: 0; }
.stat-item.open .stat-chev { transform: rotate(90deg); }
.stat-history { display: none; border-top: 1px solid var(--border); }
.hist-scroll { max-height: calc(34px * 3.5); overflow-y: auto; }
.stat-item.open .stat-history { display: block; }
.hist-entry { padding: 7px 14px; font-size: 13px; color: var(--sub); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.hist-entry:last-child { border-bottom: none; }
.hist-entry[data-id] { cursor: pointer; transition: background .1s; }
.hist-entry[data-id]:hover { background: var(--accent-bg); }
.hist-time { flex: 1; }
.hist-del-btn { border: none; background: none; color: var(--sub); cursor: pointer; padding: 2px 5px; font-size: 15px; line-height: 1; opacity: 0.5; flex-shrink: 0; border-radius: 4px; transition: all .15s; }
.hist-del-btn:hover { opacity: 1; color: var(--danger); background: rgba(201,108,98,.1); }
#stats-global-chart:not(:empty) { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 8px 14px 4px; margin-bottom: 10px; box-shadow: var(--sh); }
.stat-chart-toggle { font-size: 11px; padding: 2px 9px; border-radius: 20px; border: 1.5px solid var(--border); color: var(--sub); cursor: pointer; white-space: nowrap; transition: all .15s; }
.stat-chart-toggle:hover,.stat-chart-toggle.on { border-color: var(--accent); color: var(--accent); }
.stat-sub-section { border-top: 1px solid var(--border); }
.stat-sub-hdr { display: flex; align-items: center; padding: 7px 14px; gap: 8px; cursor: pointer; background: var(--bg); }
.stat-sub-hdr:hover { background: var(--accent-bg); }
.stat-sub-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-sub-name { flex: 1; font-size: 13px; }
.stat-sub-section .stat-chev { transition: transform .2s; }
.stat-sub-section.open .stat-chev { transform: rotate(90deg); }
.stat-sub-history { display: none; }
.stat-sub-section.open .stat-sub-history { display: block; }
.stat-chart-area { padding: 8px 14px 4px; border-top: 1px solid var(--border); overflow: clip; }
.stat-chart-area:empty { display: none; }

/* ── Habits Management ── */
.group-section { margin-bottom: 18px; }
.group-section.drag-target > .group-items { background: var(--accent-bg); border-radius: var(--r); border: 2px dashed var(--accent-border); min-height: 40px; }
.group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; padding: 0 2px; }
.group-header-drag { cursor: grab; color: #D5D1C8; display: flex; touch-action: none; }
.group-header-drag:active { cursor: grabbing; color: var(--sub); }
.group-label { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: .06em; text-transform: uppercase; }
.group-label-input { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: .06em; text-transform: uppercase; border-bottom: 1.5px solid var(--accent); background: transparent; padding: 1px 4px; flex: 1; }
.group-line { height: 1px; background: var(--border); flex: 1; }
.group-actions { display: flex; gap: 4px; }
.group-action-btn { font-size: 12px; color: var(--sub); padding: 2px 7px; border-radius: 5px; opacity: .6; }
.group-action-btn:hover { opacity: 1; color: var(--accent); }
.group-items { display: flex; flex-direction: column; gap: 4px; min-height: 4px; transition: background .15s, border .15s; }

.mgmt-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; display: flex; flex-direction: column; align-items: stretch; box-shadow: var(--sh); }
.mgmt-item.is-focus { border-left: 3px solid var(--focus-line); }
.mgmt-item.is-dragging { opacity: .35; }
.habit-row { display: flex; align-items: center; gap: 9px; }
.mgmt-name { flex: 1; font-size: 15px; cursor: text; border-radius: 4px; padding: 1px 4px; }
.mgmt-name:hover { background: rgba(0,0,0,.04); }
.mgmt-name-input { flex: 1; font-size: 15px; border-bottom: 1.5px solid var(--accent); background: transparent; padding: 1px 4px; }
.focus-toggle { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; border: 1.5px solid var(--border); color: var(--sub); cursor: pointer; transition: all .15s; white-space: nowrap; }
.focus-toggle.on { background: var(--focus-chip-bg); border-color: var(--focus-line); color: var(--focus-chip-text); }
.del-btn { color: var(--sub); padding: 4px; opacity: .4; transition: opacity .15s; flex-shrink: 0; }
.del-btn:hover { opacity: 1; color: var(--danger); }
.mgmt-item.nest-candidate { outline: 2px dashed var(--accent); outline-offset: -2px; background: var(--accent-bg); }

.new-habit-bar { display: flex; gap: 8px; margin-top: 14px; }
.new-habit-input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--surface); transition: border-color .15s; }
.new-habit-input:focus { border-color: var(--accent); }
.add-btn { padding: 10px 16px; background: var(--accent); color: #fff; border-radius: 9px; font-size: 14px; font-weight: 600; white-space: nowrap; }
.add-btn:active { opacity: .8; }

.add-group-btn { width: 100%; padding: 10px; border: 1.5px dashed var(--border); border-radius: 9px; color: var(--sub); font-size: 13px; text-align: center; cursor: pointer; margin-top: 6px; background: transparent; transition: all .15s; }
.add-group-btn:hover { border-color: var(--accent); color: var(--accent); }
.clean-habits-btn { padding: 6px 0; border: none; color: var(--danger); font-size: 12px; cursor: pointer; margin-top: 8px; background: transparent; display: block; width: fit-content; margin-left: auto; opacity: .7; transition: opacity .15s; }
.clean-habits-btn:hover { opacity: 1; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 400; padding: 24px; overflow-y: auto; justify-content: center; align-items: flex-start; }
.modal-overlay.active { display: flex; }
.modal-box { background: var(--surface); border-radius: 14px; padding: 24px; width: 100%; max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,.2); margin: auto; flex-shrink: 0; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.modal-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; background: var(--bg); transition: border-color .15s; }
input[type="datetime-local"].modal-input { font-size: 13px; }
.modal-input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-cancel { padding: 9px 18px; border-radius: 8px; color: var(--sub); font-size: 14px; }
.modal-ok { padding: 9px 20px; background: var(--accent); color: #fff; border-radius: 8px; font-size: 14px; font-weight: 600; }
.modal-danger { padding: 9px 20px; background: var(--danger); color: #fff; border-radius: 8px; font-size: 14px; font-weight: 600; }
.modal-body { font-size: 14px; color: var(--sub); margin-bottom: 4px; }

/* ── Empty ── */
.empty { text-align: center; padding: 48px 24px; color: var(--sub); font-size: 14px; }
.empty-icon { font-size: 30px; margin-bottom: 10px; }

/* ── Copyright ── */
.site-credit { text-align: center; padding: 24px 0 8px; font-size: 11px; color: var(--done); letter-spacing: .06em; }
.credit-link { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: color .15s, border-color .15s; }
.credit-link:hover { color: var(--sub); border-bottom-color: currentColor; }

/* ── Theme Toggle ── */
.ah-theme-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--sub); transition:all .15s; flex-shrink:0; }
.ah-theme-btn:hover:not(:disabled) { background:var(--border); color:var(--text); }
.ah-theme-btn:disabled { opacity:.3; cursor:default; }
/* ── User Avatar (header) ── */
.user-av-btn { width:30px; height:30px; border-radius:50%; overflow:hidden; flex-shrink:0; cursor:pointer; border:2px solid transparent; transition:border-color .15s; padding:0; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:16px; }
.user-av-btn:hover { border-color:var(--accent); }
.user-av-btn img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
/* ── Profile Modal ── */
.prof-av-preview { width:72px; height:72px; border-radius:50%; overflow:hidden; margin:0 auto 16px; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:36px; line-height:1; }
.prof-av-preview img { width:100%; height:100%; object-fit:cover; }
.prof-emoji-grid { display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; justify-content:center; }
.prof-emoji-opt { width:42px; height:42px; flex-shrink:0; font-size:22px; border-radius:8px; border:2px solid transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .12s; background:var(--bg); }
.prof-emoji-opt:hover,.prof-emoji-opt.sel { background:var(--border); border-color:var(--accent); }
.prof-upload-btn { width:100%; padding:9px; border:1.5px dashed var(--border); border-radius:8px; font-size:13px; color:var(--sub); text-align:center; cursor:pointer; margin-top:4px; transition:border-color .15s; }
.prof-upload-btn:hover { border-color:var(--accent); color:var(--accent); }
/* ── Gist Sync Indicator ── */
@keyframes spin360 { to { transform: rotate(360deg); } }
.gist-indicator { position:relative; display:flex; align-items:center; }
.gist-spin-svg { animation: spin360 .9s linear infinite; display:block; }
.gist-tooltip {
  display:none; position:fixed; top:calc(var(--header) + 8px); right:12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:8px 12px; font-size:12px;
  white-space:normal; word-break:break-word;
  box-shadow:0 4px 16px rgba(0,0,0,.12); z-index:300; color:var(--text);
  width:min(280px, calc(100vw - 24px)); line-height:1.6;
}
.gist-indicator:hover .gist-tooltip,
.gist-indicator.open .gist-tooltip { display:block; }

/* ── Date Nav (回顧) ── */
.date-nav { display:flex; align-items:center; gap:4px; margin-bottom:16px; margin-top:-8px; }
.date-nav-center { flex:1; text-align:center; font-size:13px; font-weight:700; color:var(--text); }
.date-nav-btn { width:30px; height:30px; border-radius:50%; color:var(--sub); font-size:18px; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.date-nav-btn:hover:not(:disabled) { background:var(--border); color:var(--text); }
.date-nav-btn:disabled { opacity:.25; cursor:default; }

/* ── Settings ── */
.settings-section { background:var(--surface); border-radius:var(--r); border:1px solid var(--border); padding:16px; margin-bottom:12px; box-shadow:var(--sh); }
.settings-title { font-size:14px; font-weight:700; margin-bottom:5px; }
.settings-desc { font-size:13px; color:var(--sub); margin-bottom:12px; line-height:1.45; }
.settings-btn { width:100%; padding:11px; border-radius:9px; font-size:14px; font-weight:600; background:var(--accent); color:#fff; transition:opacity .15s; }
.settings-btn:active { opacity:.8; }
.settings-btn.danger { background:var(--danger); margin-top:8px; }
.settings-inp { width:100%; box-sizing:border-box; padding:9px 12px; border:1px solid var(--border); border-radius:9px; background:var(--bg); font-size:14px; margin-bottom:8px; }
.settings-inp:focus { border-color:var(--accent); outline:none; }
.gist-status { font-size:12px; color:var(--sub); margin-bottom:10px; min-height:16px; }
.gist-status.ok { color:var(--accent); }
.gist-status.err { color:var(--danger); }
.settings-btn-row { display:flex; gap:8px; }
.settings-btn-row .settings-btn { flex:1; }

/* ── Animations ── */
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 100%{transform:scale(1)} }
.popping { animation: pop .22s ease-out; }
@keyframes flash-highlight { 0%{background:rgba(107,158,139,.25)} 100%{background:transparent} }
.flash-updated { animation: flash-highlight .9s ease-out; }
#toast {
  position:fixed; bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 12px);
  left:50%; transform:translateX(-50%) translateY(8px);
  background:var(--text); color:var(--bg);
  padding:7px 18px; border-radius:20px; font-size:13px; font-weight:600;
  opacity:0; transition:opacity .18s, transform .18s;
  z-index:500; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

<script>
'use strict';

// ══ STORAGE ══
const S = {
  get(k,d=null){try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch{return d}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))},
};
const K = {pw:'h_pw',sess:'h_sess',habits:'h_habits',groups:'h_groups',comps:'h_comps',scheds:'h_scheds',statsort:'h_ss',theme:'h_theme',hist:'h_hist',hidx:'h_hidx',autofocus:'h_autofocus',comptime:'h_comptime',gistToken:'h_gist_t',gistId:'h_gist_id',gistBkAt:'h_gist_bkat',deviceId:'h_device_id',userName:'h_uname',userAvatar:'h_uavatar'};

// ══ HISTORY ══
const Hist={
  MAX:20,_snap:false,_timer:null,_pendingLabel:'',
  label(text){this._pendingLabel=text;},
  _stack(){try{return JSON.parse(localStorage.getItem(K.hist)||'[]')}catch{return[]}},
  _idx(){const v=localStorage.getItem(K.hidx);return v===null?-1:parseInt(v)},
  _setStack(s){try{localStorage.setItem(K.hist,JSON.stringify(s))}catch(e){}},
  _setIdx(i){localStorage.setItem(K.hidx,String(i))},
  schedSnap(){
    if(this._snap)return;
    clearTimeout(this._timer);
    this._timer=setTimeout(()=>this._snapshot(),0);
  },
  _snapshot(){
    let stack=this._stack().slice(0,this._idx()+1);
    stack.push({h:S.get(K.habits,[]),g:S.get(K.groups,[]),c:S.get(K.comps,[]),s:S.get(K.scheds,{}),a:this._pendingLabel});
    this._pendingLabel='';
    if(stack.length>this.MAX)stack=stack.slice(stack.length-this.MAX);
    this._setStack(stack);this._setIdx(stack.length-1);
    if(typeof updateUndoBtns==='function')updateUndoBtns();
  },
  init(){if(this._stack().length===0)this._snapshot();},
  canUndo(){return this._idx()>0},
  canRedo(){return this._idx()<this._stack().length-1},
  undo(){
    if(!this.canUndo())return;
    const lbl=this._stack()[this._idx()]?.a||'';
    this._restore(this._idx()-1);
    if(typeof showToast==='function')showToast('↩ 已復原'+(lbl?' — '+lbl:''));
  },
  redo(){
    if(!this.canRedo())return;
    const lbl=this._stack()[this._idx()+1]?.a||'';
    this._restore(this._idx()+1);
    if(typeof showToast==='function')showToast('↪ 已重做'+(lbl?' — '+lbl:''));
  },
  _restore(i){
    const st=this._stack()[i];if(!st)return;
    this._snap=true;
    S.set(K.habits,st.h);S.set(K.groups,st.g);S.set(K.comps,st.c);S.set(K.scheds,st.s);
    this._setIdx(i);
    if(typeof Router!=='undefined'&&Router.current)Pages[Router.current].render();
    this._snap=false; // after render so render's incidental DB writes don't create new history
    clearTimeout(this._timer);
    if(typeof updateUndoBtns==='function')updateUndoBtns();
  }
};

// ══ THEME ══
function initTheme(){
  const t=S.get(K.theme,'light');
  document.documentElement.dataset.theme=t;
  updateThemeBtn();
}
function toggleTheme(){
  const isDark=document.documentElement.dataset.theme==='dark';
  const next=isDark?'light':'dark';
  document.documentElement.dataset.theme=next;
  S.set(K.theme,next);
  updateThemeBtn();
}
function updateThemeBtn(){
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=document.documentElement.dataset.theme==='dark'?'☀️':'🌙';
}

// ══ VIEW STATE ══
let viewDate=null;
let _statsChartMode='';

// ══ UTILS ══
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36)}
function pad(n){return String(n).padStart(2,'0')}
function dateKey(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function localISO(){const d=new Date();return`${dateKey(d)}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
function fmtDate(dk){
  const d=new Date(dk+'T12:00:00'),WD=['日','一','二','三','四','五','六'];
  const t=dateKey(),tm=dateKey(new Date(Date.now()+86400000));
  const datePart=`${d.getMonth()+1}月${d.getDate()}日 (${WD[d.getDay()]})`;
  if(dk===t)return`今天 ${datePart}`;if(dk===tm)return`明天 ${datePart}`;
  return datePart;
}
function fmtDateTime(iso){const d=new Date(iso);return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
function fmtTime(iso){const d=new Date(iso);return`${pad(d.getHours())}:${pad(d.getMinutes())}`}
async function sha256(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}

const DB={
  habits(){return S.get(K.habits,[])},
  saveHabits(h){S.set(K.habits,h)},
  groups(){return S.get(K.groups,[])},
  saveGroups(g){S.set(K.groups,g)},
  comps(){return S.get(K.comps,[])},
  saveComps(c){S.set(K.comps,c)},
  scheds(){return S.get(K.scheds,{})},
  saveScheds(sc){S.set(K.scheds,sc)},
  getDay(dk){const sc=this.scheds();return sc[dk]?[...sc[dk]]:null},
  getOrCreateDay(dk){
    const today=dateKey();
    const sc=this.scheds();
    // BUG-4 fix: 過去日期不注入重點培養，避免污染歷史資料
    if(dk<today){return sc[dk]?[...sc[dk]]:[]}
    const focusIds=this.habits().filter(h=>h.isFocus).map(h=>h.id);
    if(!sc[dk]){
      sc[dk]=[...focusIds];
      focusIds.forEach(id=>this.addAutoFocus(dk,id));
    } else {
      // prepend focus habits not yet in list, no duplicates
      const existing=new Set(sc[dk]);
      const missing=focusIds.filter(id=>!existing.has(id));
      if(missing.length){sc[dk]=[...missing,...sc[dk]];missing.forEach(id=>this.addAutoFocus(dk,id));}
    }
    this.saveScheds(sc);
    return[...sc[dk]];
  },
  setDay(dk,ids){
    // deduplicate, keep first occurrence
    const seen=new Set(),deduped=[];
    for(const id of ids){if(!seen.has(id)){seen.add(id);deduped.push(id)}}
    const sc=this.scheds();sc[dk]=deduped;this.saveScheds(sc);
  },
  // 自動注入（重點培養）記錄
  autofocus(){return S.get(K.autofocus,{})},
  addAutoFocus(dk,id){const m=this.autofocus();if(!m[dk])m[dk]=[];if(!m[dk].includes(id))m[dk].push(id);S.set(K.autofocus,m)},
  removeAutoFocus(dk,id){const m=this.autofocus();if(m[dk])m[dk]=m[dk].filter(x=>x!==id);S.set(K.autofocus,m)},
  // When focus changes, sync schedules
  syncFocusChange(habitId, nowFocus){
    if(nowFocus)return; // getOrCreateDay will auto-add on next render
    const today=dateKey();const sc=this.scheds();const comps=this.comps();const af=this.autofocus();
    Object.keys(sc).filter(dk=>dk>=today).forEach(dk=>{
      const completedOnDay=comps.some(c=>c.habitId===habitId&&c.at.slice(0,10)===dk);
      const wasAutoAdded=(af[dk]||[]).includes(habitId);
      // 只移除「自動注入且未完成」的，手動加入的保留
      if(!completedOnDay&&wasAutoAdded){
        sc[dk]=sc[dk].filter(id=>id!==habitId);
        this.removeAutoFocus(dk,habitId); // BUG-2 fix: sync autofocus map
      }
    });
    this.saveScheds(sc);
  },
  // When habit deleted, remove from all schedules + autofocus map
  cleanupHabit(habitId){
    const sc=this.scheds();
    Object.keys(sc).forEach(dk=>{sc[dk]=sc[dk].filter(id=>id!==habitId)});
    this.saveScheds(sc);
    // BUG-1 fix: also clean autofocus map
    const af=this.autofocus();
    Object.keys(af).forEach(dk=>{af[dk]=(af[dk]||[]).filter(id=>id!==habitId)});
    S.set(K.autofocus,af);
  },
  addComp(habitId){if(this.isDoneToday(habitId))return; // BUG-3 fix: dedup
    const c=this.comps();c.push({id:uid(),habitId,at:localISO()});this.saveComps(c)},
  removeComp(habitId,dk){
    const c=this.comps();
    for(let i=c.length-1;i>=0;i--){if(c[i].habitId===habitId&&c[i].at.slice(0,10)===dk){c.splice(i,1);break}}
    this.saveComps(c);
  },
  isDoneToday(id){const dk=dateKey();return this.comps().some(c=>c.habitId===id&&c.at.slice(0,10)===dk)},
  isDoneOnDay(id,dk){return this.comps().some(c=>c.habitId===id&&c.at.slice(0,10)===dk)},
  getTodayCompTime(id){
    const dk=dateKey();const f=this.comps().filter(c=>c.habitId===id&&c.at.slice(0,10)===dk);
    return f.length?f[f.length-1].at:null;
  },
  getCompTimeOnDay(id,dk){
    const f=this.comps().filter(c=>c.habitId===id&&c.at.slice(0,10)===dk);
    return f.length?f[f.length-1].at:null;
  },
  getCompOnDay(id,dk){
    const f=this.comps().filter(c=>c.habitId===id&&c.at.slice(0,10)===dk);
    return f.length?f[f.length-1]:null;
  },
  addCompOnDay(habitId,dk){
    if(this.isDoneOnDay(habitId,dk))return; // BUG-3 fix: dedup
    const c=this.comps();
    let at;
    if(dk===dateKey()){
      at=localISO();
    } else {
      const mode=S.get(K.comptime,'eod'); // 'eod' | 'now'
      at=mode==='now'?localISO():dk+'T23:59:59';
    }
    c.push({id:uid(),habitId,at});this.saveComps(c);
  },
  hmap(){return Object.fromEntries(this.habits().map(h=>[h.id,h]))},
  focusIds(){return new Set(this.habits().filter(h=>h.isFocus).map(h=>h.id))},
};

// ══ GIST BACKUP ══
async function _gcrypt(plain,pwHash,mode){
  const enc=new TextEncoder();
  const salt=mode==='enc'?crypto.getRandomValues(new Uint8Array(16)):plain.slice(0,16);
  const iv  =mode==='enc'?crypto.getRandomValues(new Uint8Array(12)):plain.slice(16,28);
  const km=await crypto.subtle.importKey('raw',enc.encode(pwHash),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,[mode==='enc'?'encrypt':'decrypt']);
  if(mode==='enc'){
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(plain));
    const buf=new Uint8Array(16+12+ct.byteLength);buf.set(salt,0);buf.set(iv,16);buf.set(new Uint8Array(ct),28);
    return btoa(String.fromCharCode(...buf));
  }else{
    const ct=plain.slice(28);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    return new TextDecoder().decode(pt);
  }
}
async function gistEncrypt(str,pwHash){return _gcrypt(str,pwHash,'enc');}
async function gistDecrypt(b64,pwHash){
  const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  return _gcrypt(buf,pwHash,'dec');
}
const GistBackup={
  token(){return S.get(K.gistToken,'');},
  setToken(t){S.set(K.gistToken,t);},
  gistId(){return S.get(K.gistId,'');},
  setGistId(id){S.set(K.gistId,id);},
  backedAt(){return S.get(K.gistBkAt,'');},
  setBackedAt(t){S.set(K.gistBkAt,t);},
  pwHash(){return S.get(K.pw,'');},
  // 每個瀏覽器產生一次、穩定的 UUID，作為 Gist 檔名後綴，避免多瀏覽器互相覆蓋
  deviceId(){
    let id=S.get(K.deviceId,'');
    if(!id){id=crypto.randomUUID();S.set(K.deviceId,id);}
    return id;
  },
  fileName(){return 'habit-grow-'+this.deviceId().slice(0,8)+'.enc';},
  async push(signal){
    const token=this.token();if(!token)throw new Error('未設定 GitHub Token');
    const data={version:1,exportedAt:localISO(),habits:DB.habits(),groups:DB.groups(),comps:DB.comps(),scheds:DB.scheds()};
    const enc=await gistEncrypt(JSON.stringify(data),this.pwHash());
    const headers={'Authorization':'token '+token,'Content-Type':'application/json'};
    const fname=this.fileName();
    const uname=S.get(K.userName,'')||'user';
    const desc=`habit-grow · ${uname} · ${this.deviceId().slice(0,6)}`;
    const body=JSON.stringify({description:desc,public:false,files:{[fname]:{content:enc}}});
    let gid=this.gistId();
    let res=await fetch(gid?`https://api.github.com/gists/${gid}`:'https://api.github.com/gists',{method:gid?'PATCH':'POST',headers,body,signal});
    // Gist 被刪除時 → 清掉舊 id，改用 POST 重新建立
    if(res.status===404&&gid){this.setGistId('');gid='';res=await fetch('https://api.github.com/gists',{method:'POST',headers,body,signal});}
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`HTTP ${res.status}`);}
    const json=await res.json();this.setGistId(json.id);this.setBackedAt(localISO());return json.id;
  },
  async pull(){
    const token=this.token();const gid=this.gistId();
    if(!token)throw new Error('未設定 GitHub Token');
    if(!gid)throw new Error('尚無 Gist 備份紀錄');
    const res=await fetch(`https://api.github.com/gists/${gid}`,{headers:{'Authorization':'token '+token}});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const json=await res.json();
    const enc=json.files?.[this.fileName()]?.content;
    if(!enc)throw new Error('找不到備份內容（此裝置尚無備份）');
    const plain=await gistDecrypt(enc,this.pwHash());
    const data=JSON.parse(plain);
    if(!data.habits||!Array.isArray(data.habits))throw new Error('備份格式錯誤');
    Hist.label('從 Gist 還原資料');
    if(data.habits)DB.saveHabits(data.habits);if(data.groups)DB.saveGroups(data.groups);
    if(data.comps)DB.saveComps(data.comps);if(data.scheds)DB.saveScheds(data.scheds);
    return data.exportedAt||'';
  },
};

const PROF_EMOJIS=['🌱','🌿','🏃','💪','📚','🎯','🌟','☀️','🦋','🌸','🍀','🔥'];
function _nameToColor(name){
  const palette=['#6B9E8B','#E8A87C','#85C1E9','#BB8FCE','#82E0AA','#F1948A','#76D7C4','#F8C471'];
  let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))&0xFFFF;
  return palette[h%palette.length];
}
function makeInitialAvatar(name){
  // 回傳一個物件 {type:'initial', color, initial}，讓 renderAvatarEl 用純 CSS 渲染
  const color=_nameToColor(name);

  return JSON.stringify({type:'initial',color,initial});
}
function getAvatar(name){

function _renderInitialDiv(el,color,initial,fontSize='36px'){
  el.innerHTML='';
  el.style.background=color;

  span.style.cssText=`color:#fff;font-weight:700;font-size:${fontSize};line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%`;

function renderAvatarEl(el,avatar,name){
  if(!el)return;
  el.style.background='';
  if(avatar&&avatar.startsWith('{')){
    try{
      const d=JSON.parse(avatar);
      if(d.type==='initial'){_renderInitialDiv(el,d.color,d.initial);return;}
    }catch{}
  }
  if(avatar&&(avatar.startsWith('data:')||avatar.startsWith('http'))){
    el.innerHTML=`<img src="${avatar}" alt="avatar">`;
  }else if(avatar){
    el.innerHTML=avatar; // emoji

async function resizeToDataURL(file){
  return new Promise(resolve=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const s=Math.min(img.width,img.height);
      const c=document.createElement('canvas');c.width=c.height=64;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,64,64);
      URL.revokeObjectURL(url);resolve(c.toDataURL('image/jpeg',0.82));
    };img.onerror=()=>{URL.revokeObjectURL(url);resolve('');};img.src=url;
  });
}

function getWeeks(n=8){
  const ws=[];const now=new Date();
  for(let w=n-1;w>=0;w--){const d=new Date(now);d.setDate(d.getDate()-w*7);d.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));ws.push(dateKey(d));}

function makePieSVG(slices){
  const filled=slices.filter(s=>s.count>0);

  if(!total)return'<p style="text-align:center;padding:12px 0;color:var(--sub)">尚無資料</p>';
  const W=320,R=80,cx=90,cy=90;let paths='',textEls='';

    // 單 slice = 100%，SVG arc 無法畫整圓，改用 circle

    textEls=`<text x="${cx}" y="${(cy+4)}" text-anchor="middle" font-size="11" fill="white" font-weight="700" font-family="system-ui">100%</text>`;
  }else{
    let angle=-Math.PI/2;
    filled.forEach(s=>{
      const a=2*Math.PI*(s.count/total);
      const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
      const x2=cx+R*Math.cos(angle+a),y2=cy+R*Math.sin(angle+a);
      const large=a>Math.PI?1:0;
      paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${s.color}" stroke="var(--surface)" stroke-width="1.5"/>`;
      if(s.count/total>0.07){const ma=angle+a/2;const lx=cx+R*.62*Math.cos(ma),ly=cy+R*.62*Math.sin(ma);textEls+=`<text x="${lx.toFixed(1)}" y="${(ly+3.5).toFixed(1)}" text-anchor="middle" font-size="11" fill="white" font-weight="700" font-family="system-ui">${Math.round(s.count/total*100)}%</text>`;}
      angle+=a;
    });
  }
  const PIE_FOLDER=`<path d="M1 2.5C1 1.67 1.67 1 2.5 1h4.17c.46 0 .9.2 1.2.54L9.5 3H17.5C18.33 3 19 3.67 19 4.5v9c0 .83-.67 1.5-1.5 1.5h-15C1.67 15 1 14.33 1 13.5V2.5z" opacity=".35"/><path d="M1 5.5C1 4.67 1.67 4 2.5 4H17.5C18.33 4 19 4.67 19 5.5V13.5C19 14.33 18.33 15 17.5 15h-15C1.67 15 1 14.33 1 13.5V5.5z"/>`;
  let legend='';filled.forEach((s,i)=>{const y=10+i*22;const lbl=s.label.length>12?s.label.slice(0,12)+'…':s.label;legend+=`<rect x="180" y="${y}" width="10" height="10" rx="2" fill="${s.color}"/>`;if(s.isParent){legend+=`<g transform="translate(194,${y-1}) scale(0.475)" fill="var(--sub)">${PIE_FOLDER}</g><text x="205" y="${y+9}" font-size="12" fill="var(--text)" font-family="system-ui">${lbl} · ${s.count}次</text>`;}else{legend+=`<text x="194" y="${y+9}" font-size="12" fill="var(--text)" font-family="system-ui">${lbl} · ${s.count}次</text>`;}});
  const H=Math.max(180,filled.length*22+20);
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${paths}${textEls}${legend}</svg>`;
}
function makeLineSVG(lines,weekLabels){

  const W=320,padL=26,padB=22,padT=10,padR=18,chartH=110;
  const chartW=W-padL-padR;const weeks=weekLabels.length;const maxVal=Math.max(...lines.flatMap(l=>l.data),1);
  const px=i=>padL+i*(chartW/(weeks-1||1));const py=v=>padT+chartH*(1-v/maxVal);
  let els=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="var(--border)" stroke-width="1"/>`;
  els+=`<line x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}" stroke="var(--border)" stroke-width="1"/>`;

  const yLbl=v=>{const y=py(v);if(y<padT+6||y>padT+chartH-4)return'';return`<text x="${padL-4}" y="${y.toFixed(1)+4}" text-anchor="end" font-size="9" fill="var(--sub)" font-family="system-ui">${v}</text>`;};

  lines.forEach(l=>{l.data.forEach((v,i)=>{if(v>0)els+=`<circle cx="${px(i).toFixed(1)}" cy="${py(v).toFixed(1)}" r="3.5" fill="${l.color}" stroke="var(--surface)" stroke-width="1.5"/>`;});});
  weekLabels.forEach((lbl,i)=>{els+=`<text x="${px(i).toFixed(1)}" y="${padT+chartH+15}" text-anchor="middle" font-size="10" fill="var(--sub)" font-family="system-ui">${lbl}</text>`;});
  const legY=padT+chartH+padB+2;const iw=Math.floor(W/Math.min(lines.length,4));
  const FOLDER_PATH=`<path d="M1 2.5C1 1.67 1.67 1 2.5 1h4.17c.46 0 .9.2 1.2.54L9.5 3H17.5C18.33 3 19 3.67 19 4.5v9c0 .83-.67 1.5-1.5 1.5h-15C1.67 15 1 14.33 1 13.5V2.5z" opacity=".35"/><path d="M1 5.5C1 4.67 1.67 4 2.5 4H17.5C18.33 4 19 4.67 19 5.5V13.5C19 14.33 18.33 15 17.5 15h-15C1.67 15 1 14.33 1 13.5V5.5z"/>`;
  lines.forEach((l,i)=>{const x=(i%4)*iw;const y=legY+(Math.floor(i/4)*16);const lbl=l.label.length>10?l.label.slice(0,10)+'…':l.label;els+=`<rect x="${x}" y="${y}" width="9" height="9" rx="1.5" fill="${l.color}"/>`;if(l.isParent){els+=`<g transform="translate(${x+13},${y-1}) scale(0.475)" fill="var(--sub)">${FOLDER_PATH}</g><text x="${x+24}" y="${y+8}" font-size="11" fill="var(--text)" font-family="system-ui">${lbl}</text>`;}else{els+=`<text x="${x+13}" y="${y+8}" font-size="11" fill="var(--text)" font-family="system-ui">${lbl}</text>`;}});
  const H=legY+Math.ceil(lines.length/4)*16+6;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${els}</svg>`;
}

// ══ DRAG SORT (single list) ══
function makeSortable(container, selector, onEnd, handleSel='.drag-handle'){
  let drag=null,ghost=null,offsetY=0;
  const cy=e=>e.touches?e.touches[0].clientY:e.clientY;
  function start(e){
    const h=e.target.closest(handleSel);if(!h)return;
    drag=h.closest(selector);if(!drag||!container.contains(drag))return;
    const r=drag.getBoundingClientRect();offsetY=cy(e)-r.top;
    ghost=drag.cloneNode(true);ghost.className='drag-ghost';
    ghost.style.cssText=`width:${r.width}px;top:${r.top}px;left:${r.left}px`;
    document.body.appendChild(ghost);drag.classList.add('is-dragging');
    document.addEventListener('mousemove',move);document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('mouseup',end,{once:true});document.addEventListener('touchend',end,{once:true});
    e.preventDefault();
  }
  function move(e){
    const y=cy(e);ghost.style.top=(y-offsetY)+'px';
    const items=[...container.querySelectorAll(selector)].filter(i=>i!==drag);
    let before=null;
    for(const el of items){const r=el.getBoundingClientRect();if(y<r.top+r.height/2){before=el;break}}
    before?container.insertBefore(drag,before):items.pop()?.after(drag);
    if(e.cancelable)e.preventDefault();
  }
  function end(){
    if(!drag)return;drag.classList.remove('is-dragging');ghost.remove();
    onEnd([...container.querySelectorAll(selector)].map(el=>el.dataset.id));
    drag=null;ghost=null;
    document.removeEventListener('mousemove',move);document.removeEventListener('touchmove',move);
  }
  container.addEventListener('mousedown',start);
  container.addEventListener('touchstart',start,{passive:false});
}

// ══ CROSS-GROUP DRAG (habits management) ══
function makeCrossGroupSortable(wrapper,callbacks,opts={}){
  const ITEM=opts.itemSel||'.mgmt-item';
  const SUB=opts.subItemSel||'.sub-item';
  const PROXY_CLS=opts.proxyClass||'mgmt-item';
  const onReorder=typeof callbacks==='function'?callbacks:(callbacks.onReorder||callbacks);
  const onNest=typeof callbacks==='function'?null:callbacks.onNest;
  const onPromote=typeof callbacks==='function'?null:callbacks.onPromote;
  const onNestSub=typeof callbacks==='function'?null:callbacks.onNestSub;
  let drag=null,ghost=null,offsetX=0,offsetY=0,lastTarget=null,nestTarget=null,proxyEl=null,dragHasChildren=false;
  const cy=e=>e.touches?e.touches[0].clientY:e.clientY;
  const cx=e=>e.touches?e.touches[0].clientX:e.clientX;
  function allGroupItems(){return[...wrapper.querySelectorAll('.group-items')]}
  function groupOf(el){return el.closest('.group-items')}
  function insertAt(group,y){
    const items=[...group.querySelectorAll(ITEM)].filter(i=>i!==drag);
    let before=null;
    for(const el of items){const r=el.getBoundingClientRect();if(y<r.top+r.height/2){before=el;break}}
    before?group.insertBefore(drag,before):group.appendChild(drag);
  }
  function targetGroupAt(x,y){
    for(const sec of wrapper.querySelectorAll('.group-section')){
      const r=sec.getBoundingClientRect();
      if(x>=r.left&&x<=r.right&&y>=r.top-16&&y<=r.bottom+16)return sec.querySelector('.group-items');
    }
    return null;
  }
  function clearNest(){if(nestTarget){nestTarget.classList.remove('nest-candidate');nestTarget=null;}}
  wrapper.addEventListener('mousedown',start);wrapper.addEventListener('touchstart',start,{passive:false});
  function start(e){
    const h=e.target.closest('.drag-handle');if(!h)return;
    const subItem=onPromote?h.closest(SUB):null;
    const mgmtItem=h.closest(ITEM);
    if(subItem){
      proxyEl=document.createElement('div');
      proxyEl.className=PROXY_CLS;proxyEl.dataset.id=subItem.dataset.id;
      proxyEl.style.cssText='opacity:0;min-height:40px;pointer-events:none;';
      const parentMgmt=subItem.closest(ITEM);
      const gi=parentMgmt?.closest('.group-items');if(!gi)return;
      gi.insertBefore(proxyEl,parentMgmt.nextSibling);
      drag=proxyEl;subItem.style.opacity='0.25';
      const r=subItem.getBoundingClientRect();offsetX=cx(e)-r.left;offsetY=cy(e)-r.top;
      ghost=subItem.cloneNode(true);ghost.className='drag-ghost';
      ghost.style.cssText=`width:${r.width}px;top:${r.top}px;left:${r.left}px`;
    } else if(mgmtItem){
      drag=mgmtItem;dragHasChildren=false;
      const r=drag.getBoundingClientRect();offsetX=cx(e)-r.left;offsetY=cy(e)-r.top;
      ghost=drag.cloneNode(true);ghost.className='drag-ghost';
      ghost.style.cssText=`width:${r.width}px;top:${r.top}px;left:${r.left}px`;
    } else return;
    document.body.appendChild(ghost);drag.classList.add('is-dragging');
    document.addEventListener('mousemove',move);document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('mouseup',end,{once:true});document.addEventListener('touchend',end,{once:true});
    e.preventDefault();
  }
  function move(e){
    const x=cx(e),y=cy(e);
    ghost.style.top=(y-offsetY)+'px';ghost.style.left=(x-offsetX)+'px';
    clearNest();
    const tg=targetGroupAt(x,y);
    if(tg){
      if(tg!==lastTarget){
        allGroupItems().forEach(g=>g.closest('.group-section')?.classList.remove('drag-target'));
        tg.closest('.group-section')?.classList.add('drag-target');lastTarget=tg;
      }
      const canNest=(!proxyEl&&onNest&&!dragHasChildren)||(proxyEl&&onNestSub);
      if(canNest){
        const items=[...tg.querySelectorAll(ITEM)].filter(i=>i!==drag);
        let hoverItem=null;
        for(const el of items){const r=el.getBoundingClientRect();if(y>=r.top&&y<=r.bottom){hoverItem=el;break}}
        if(hoverItem){
          const r=hoverItem.getBoundingClientRect();const rel=(y-r.top)/r.height;
          if(rel>=0.28&&rel<=0.72){nestTarget=hoverItem;hoverItem.classList.add('nest-candidate');}
          else insertAt(tg,y);
        } else insertAt(tg,y);
      } else insertAt(tg,y);
    }
    if(e.cancelable)e.preventDefault();
  }
  function end(){
    if(!drag)return;
    allGroupItems().forEach(g=>g.closest('.group-section')?.classList.remove('drag-target'));
    drag.classList.remove('is-dragging');ghost.remove();
    if(proxyEl){
      const subId=proxyEl.dataset.id;
      if(nestTarget){
        const newParentId=nestTarget.dataset.id;clearNest();
        proxyEl.remove();proxyEl=null;
        wrapper.querySelector(`${SUB}[data-id="${subId}"]`)?.style.removeProperty('opacity');
        if(onNestSub)onNestSub({subId,newParentId});
      }else{
        const finalGroup=groupOf(proxyEl);
        const newGroupId=finalGroup?finalGroup.closest('.group-section')?.dataset.gid||null:null;
        const allIds=[...finalGroup?.querySelectorAll(ITEM)||[]].map(el=>el.dataset.id);
        proxyEl.remove();proxyEl=null;
        wrapper.querySelector(`${SUB}[data-id="${subId}"]`)?.style.removeProperty('opacity');
        if(onPromote)onPromote({subId,newGroupId,newOrder:allIds});
      }
    } else if(nestTarget){
      const parentId=nestTarget.dataset.id;clearNest();
      if(onNest)onNest({habitId:drag.dataset.id,parentId});
    } else {
      clearNest();
      const finalGroup=groupOf(drag);
      const newGroupId=finalGroup?finalGroup.closest('.group-section')?.dataset.gid||null:null;
      const newOrder=[...finalGroup.querySelectorAll(ITEM)].map(el=>el.dataset.id);
      onReorder({habitId:drag.dataset.id,newGroupId,newOrder});
    }
    drag=null;ghost=null;lastTarget=null;nestTarget=null;dragHasChildren=false;
    document.removeEventListener('mousemove',move);document.removeEventListener('touchmove',move);
  }
}

// ══ AUTOCOMPLETE ══
class AC{
  constructor(inp,dd,{getOptions,onSelect,allowCreate=true,onClose}={}){
    this.inp=inp;this.dd=dd;this.getOptions=getOptions;this.onSelect=onSelect;
    this.allowCreate=allowCreate;this.onClose=onClose;this.hl=-1;this.opts=[];
    inp.addEventListener('input',()=>this.update());
    inp.addEventListener('focus',()=>this.update());
    inp.addEventListener('keydown',e=>this.onKey(e));
    document.addEventListener('click',e=>{if(!inp.contains(e.target)&&!dd.contains(e.target))this.close()},true);
    // 鍵盤升起時重新計算 dropdown 位置
    if(window.visualViewport)window.visualViewport.addEventListener('resize',()=>this._reposition());
  }
  update(){
    const q=this.inp.value.trim().toLowerCase();
    const opts=this.getOptions(q);this.opts=[...opts];
    if(this.allowCreate&&q&&!opts.find(o=>o.label.toLowerCase()===q))
      this.opts.push({type:'create',label:this.inp.value.trim()});
    this.hl=-1;this.render();
  }
  _reposition(){
    if(this.dd.style.display==='none'||!this.dd.style.display)return;
    // 鍵盤偵測：visualViewport.height 縮小超過 100px 代表鍵盤已打開
    // 鍵盤是系統 UI，z-index 無效，需強制往上展開；nav 已靠 z-index:150 解決
    const kbOpen=window.visualViewport&&(window.innerHeight-window.visualViewport.height>100);
    const rect=this.inp.getBoundingClientRect();
    const viewH=window.innerHeight;
    const spaceBelow=viewH-rect.bottom-8;
    const navH=document.querySelector('.bottom-nav')?.offsetHeight||58;
    if(kbOpen||spaceBelow<150){
      this.dd.style.top='auto';
      this.dd.style.bottom='calc(100% + 4px)';
      this.dd.style.maxHeight='220px';
    }else{
      this.dd.style.top='calc(100% + 4px)';
      this.dd.style.bottom='auto';
      this.dd.style.maxHeight=Math.min(220,viewH-rect.bottom-navH-8)+'px';
    }
  }
  render(){
    if(!this.opts.length){this.close();return}
    this.dd.innerHTML=this.opts.map((o,i)=>
      `<div class="ac-item${o.type==='create'?' new':''}" data-i="${i}">${o.type==='create'?`新增「${o.label}」`:o.label}${o.sub&&!o.type?`<span class="ac-item-sub">${SVG.folder}${o.sub}</span>`:''}</div>`
    ).join('');
    this.dd.style.display='block';
    this._reposition();
    this.dd.querySelectorAll('.ac-item').forEach((el,i)=>{
      el.addEventListener('mousedown',e=>e.preventDefault());
      el.addEventListener('click',()=>this.select(i));
      el.addEventListener('mouseover',()=>this.setHl(i));
    });
  }
  setHl(i){this.hl=i;this.dd.querySelectorAll('.ac-item').forEach((el,j)=>el.classList.toggle('hl',j===i))}
  onKey(e){
    if(this.dd.style.display==='none'||!this.dd.style.display)return;
    if(e.key==='ArrowDown'){e.preventDefault();this.setHl(Math.min(this.hl+1,this.opts.length-1))}
    else if(e.key==='ArrowUp'){e.preventDefault();this.setHl(Math.max(this.hl-1,0))}
    else if(e.key==='Enter'){e.preventDefault();if(this.hl>=0)this.select(this.hl);else if(this.opts.length===1)this.select(0)}
    else if(e.key==='Escape'){this.close();this.inp.blur();this.onClose&&this.onClose()}
  }
  select(i){const opt=this.opts[i];this.onSelect(opt);this.close();this.inp.value=''}
  close(){this.dd.style.display='none';this.hl=-1}
}

// ══ SHARED HELPERS ══
function createHabit(name){return {id:uid(),name,isFocus:false,groupId:null,createdAt:localISO()};}
function getOrCreateHabitId(name){
  const all=DB.habits();const ex=all.find(h=>h.name===name);
  if(ex)return ex.id;
  const h=createHabit(name);all.push(h);DB.saveHabits(all);return h.id;
}
function optFromHabit(h,gmap={}){return{id:h.id,label:h.name,sub:h.groupId&&gmap[h.groupId]?gmap[h.groupId].name:null}}
function getHabitOptions(q,excludeIds=[]){
  const excl=new Set(excludeIds);
  const gmap=Object.fromEntries(DB.groups().map(g=>[g.id,g]));
  return DB.habits().filter(h=>!excl.has(h.id)&&(!q||h.name.toLowerCase().includes(q))).map(h=>optFromHabit(h,gmap));
}
function resolveOpt(opt){
  if(opt.type==='create')return getOrCreateHabitId(opt.label);
  return opt.id;
}

// ══ SLOT REPLACE ══
function startSlotReplace(div,currentId,dk,onChange){
  const nameEl=div.querySelector('.slot-name');const rmBtn=div.querySelector('.rm-slot-btn');
  if(!nameEl)return;
  const inp=document.createElement('input');inp.className='slot-replace-input';inp.placeholder='替換習慣…';
  const dd=document.createElement('div');dd.className='slot-replace-dd';
  nameEl.style.display='none';if(rmBtn)rmBtn.style.display='none';
  div.style.position='relative';
  div.insertBefore(inp,nameEl);div.appendChild(dd);
  const ac=new AC(inp,dd,{
    getOptions(q){
      const cur=new Set(DB.getDay(dk)||[]);cur.delete(currentId);
      const gmap=Object.fromEntries(DB.groups().map(g=>[g.id,g]));
      return DB.habits().filter(h=>!cur.has(h.id)&&(!q||h.name.toLowerCase().includes(q))).map(h=>optFromHabit(h,gmap));
    },
    onSelect(opt){
      const newId=resolveOpt(opt);
      const order=DB.getDay(dk)||[];const idx=order.indexOf(currentId);
      if(idx!==-1){
        const oldName=DB.hmap()[currentId]?.name||'';
        order[idx]=newId;DB.setDay(dk,order);
        Hist.label(`替換排程「${oldName}」→「${opt.label}」`);
        showToast(`已替換為「${opt.label}」`);
      }
      onChange();
    },
    allowCreate:true,
    onClose(){cancel()}
  });
  function cancel(){inp.remove();dd.remove();nameEl.style.display='';if(rmBtn)rmBtn.style.display='';div.style.position=''}
  inp.addEventListener('blur',()=>setTimeout(()=>{if(!dd.contains(document.activeElement))cancel()},200));
  setTimeout(()=>{inp.focus();ac.update()},10);
}

function makeSlotItem(h,dk,{showCheck=false,isDone=false,isFocus=false,groupName=null}={},onChange){
  const div=document.createElement('div');
  div.className=`slot-item${isDone?' done':''}${isFocus?' is-focus':''}`;
  div.dataset.id=h.id;
  const nameHtml=groupName
    ?`<div class="slot-name-wrap"><span class="slot-name">${h.name}</span><span class="slot-parent-tag">${SVG.folder}${groupName}</span></div>`
    :`<span class="slot-name">${h.name}</span>`;
  const ct=isDone?DB.getCompTimeOnDay(h.id,dk):null;
  if(isDone){
    div.innerHTML=`
      <span class="drag-handle">${SVG.grip}</span>
      ${showCheck?`<button class="check-btn on" type="button" title="點擊恢復">${SVG.check}</button>`:''}
      ${nameHtml}
      ${ct?`<span class="slot-time">${fmtTime(ct)}</span>`:''}
    `;
    if(showCheck){
      div.querySelector('.check-btn').addEventListener('click',()=>{
        Hist.label(`取消打勾「${h.name}」`);DB.removeComp(h.id,dk);showToast(`取消「${h.name}」`);onChange();
      });
    }
    const timeEl=div.querySelector('.slot-time');
    if(timeEl){
      function attachTimeClick(){
        timeEl.addEventListener('click',function onTimeClick(){
          timeEl.removeEventListener('click',onTimeClick);
          const comp=DB.getCompOnDay(h.id,dk);if(!comp){attachTimeClick();return;}
          showDateTimeModal(comp.at.slice(0,16),newVal=>{
            if(newVal){
              const newAt=newVal+':00';
              if(newAt!==comp.at){
                const all=DB.comps();const idx=all.findIndex(c=>c.id===comp.id);
                if(idx!==-1){Hist.label('修改完成時間');all[idx].at=newAt;DB.saveComps(all);showToast('已更新時間');}
                timeEl.textContent=fmtTime(newAt);flashEl(div);
              }
            }
            attachTimeClick();
          });
        });
      }
      attachTimeClick();
    }
  } else {
    div.innerHTML=`
      <span class="drag-handle">${SVG.grip}</span>
      ${showCheck?`<button class="check-btn" type="button">${SVG.check}</button>`:''}
      ${nameHtml}
      <button class="rm-slot-btn" type="button">×</button>
    `;
    if(showCheck){
      div.querySelector('.check-btn').addEventListener('click',()=>{
        div.querySelector('.check-btn').classList.add('on','popping');
        Hist.label(`打勾「${h.name}」`);DB.addCompOnDay(h.id,dk);showToast(`完成「${h.name}」`);setTimeout(onChange,300);
      });
    }
    div.querySelector('.rm-slot-btn').addEventListener('click',()=>{
      Hist.label(`移除排程「${h.name}」`);DB.setDay(dk,(DB.getDay(dk)||[]).filter(id=>id!==h.id));DB.removeAutoFocus(dk,h.id);showToast(`已移除「${h.name}」`);onChange();
    });
    div.querySelector('.slot-name').addEventListener('click',()=>startSlotReplace(div,h.id,dk,onChange));
  }
  return div;
}

// ══ RENDER DAY SLOTS ══
function renderDaySlots(container,dk,{showCheck=false}={},onUpdate){
  container.innerHTML='';
  const order=DB.getOrCreateDay(dk);
  const hmap=DB.hmap();const focusSet=DB.focusIds();
  const gmap=Object.fromEntries(DB.groups().map(g=>[g.id,g]));
  function refresh(){onUpdate?onUpdate():renderDaySlots(container,dk,{showCheck},null)}
  const pending=order.filter(id=>hmap[id]&&(!showCheck||!DB.isDoneOnDay(id,dk)));
  const list=document.createElement('div');list.className='slot-list';
  pending.forEach(id=>{
    const h=hmap[id];if(!h)return;
    const groupName=h.groupId&&gmap[h.groupId]?gmap[h.groupId].name:null;
    list.appendChild(makeSlotItem(h,dk,{showCheck,isDone:false,isFocus:focusSet.has(id),groupName},refresh));
  });
  container.appendChild(list);
  makeSortable(list,'.slot-item',newOrder=>{
    const doneIds=showCheck?order.filter(id=>hmap[id]&&DB.isDoneOnDay(id,dk)):[];
    Hist.label('重新排序排程');DB.setDay(dk,[...newOrder.filter(id=>!doneIds.includes(id)),...doneIds]);refresh();
  });
  const acWrap=document.createElement('div');acWrap.className='ac-wrap';
  const acInp=document.createElement('input');acInp.className='ac-input';acInp.placeholder='請增加新的習慣…';acInp.autocomplete='off';
  const acDd=document.createElement('div');acDd.className='ac-dropdown';
  acWrap.appendChild(acInp);acWrap.appendChild(acDd);container.appendChild(acWrap);
  new AC(acInp,acDd,{
    getOptions(q){const cur=new Set(DB.getDay(dk)||[]);return getHabitOptions(q,[...cur])},
    onSelect(opt){
      const id=resolveOpt(opt);const ord=DB.getOrCreateDay(dk);
      if(!ord.includes(id)){Hist.label(`新增「${opt.label}」到排程`);DB.setDay(dk,[...ord,id]);showToast(`已加入「${opt.label}」`);}
      DB.removeAutoFocus(dk,id); // 手動加入 → 不算自動注入，取消重點培養時不會被移除
      refresh();
    }
  });
}

// ══ PAGES ══
const Pages={

  // HOME
  home:{
    render(){
      if(!viewDate)viewDate=dateKey();
      const dk=viewDate;const today=dateKey();const isToday=dk===today;
      document.getElementById('home-date-label').textContent=fmtDate(dk);
      document.getElementById('date-next').disabled=isToday;
      const _dp=document.getElementById('home-date-picker');if(_dp){_dp.value=dk;_dp.max=today;}
      this.renderToday();
      if(isToday){this.renderFocus();this.renderUpcoming();}
      else{document.getElementById('focus-display').innerHTML='';document.getElementById('upcoming-display').innerHTML='';}
    },
    renderToday(){
      const dk=viewDate||dateKey();const self=this;
      const slotsEl=document.getElementById('home-today-slots');
      renderDaySlots(slotsEl,dk,{showCheck:true},()=>{self.renderToday();self.renderDoneSection();});
      this.renderDoneSection();
    },
    renderDoneSection(){
      const dk=viewDate||dateKey();const hmap=DB.hmap();
      const gmap=Object.fromEntries(DB.groups().map(g=>[g.id,g]));
      const order=DB.getOrCreateDay(dk);
      const focusSet=DB.focusIds();
      const done=order.filter(id=>hmap[id]&&DB.isDoneOnDay(id,dk));
      const wrap=document.getElementById('home-done-wrap');
      const list=document.getElementById('home-done-list');list.innerHTML='';
      if(done.length){
        wrap.style.display='block';const self=this;
        done.forEach(id=>{
          const h=hmap[id];if(!h)return;
          const cb=()=>{self.renderToday();self.renderDoneSection();};
          const groupName=h.groupId&&gmap[h.groupId]?gmap[h.groupId].name:null;
          list.appendChild(makeSlotItem(h,dk,{showCheck:true,isDone:true,isFocus:focusSet.has(id),groupName},cb));
        });
        makeSortable(list,'.slot-item',newDoneOrder=>{
          const pending=order.filter(id=>hmap[id]&&!DB.isDoneOnDay(id,dk));
          DB.setDay(dk,[...pending,...newDoneOrder]);
        });
      } else wrap.style.display='none';
    },
    renderFocus(){
      const fh=DB.habits().filter(h=>h.isFocus);
      document.getElementById('focus-display').innerHTML=fh.length?`<div class="focus-box"><div class="focus-box-title">重點培養</div><div class="focus-chips">${fh.map(h=>`<span class="focus-chip">${h.name}</span>`).join('')}</div></div>`:'';
    },
    renderUpcoming(){
      const el=document.getElementById('upcoming-display');
      const hmap=DB.hmap();const focusSet=DB.focusIds();
      const scheds=DB.scheds();const today=dateKey();const self=this;
      const upcoming=[];
      for(let i=1;i<=60;i++){
        const d=new Date();d.setDate(d.getDate()+i);const dk=dateKey(d);
        const order=scheds[dk];if(!order)continue;
        if(!order.some(id=>!focusSet.has(id)&&hmap[id]))continue;
        upcoming.push(dk);if(upcoming.length>=7)break;
      }
      el.innerHTML='';
      if(!upcoming.length)return;
      const label=document.createElement('div');label.className='sec-label';label.style.marginTop='18px';label.textContent='即將到來';
      el.appendChild(label);
      upcoming.forEach(dk=>{
        const block=document.createElement('div');block.className='upcoming-day-block';
        const hdr=document.createElement('div');hdr.className='upcoming-date-header';hdr.textContent=fmtDate(dk);
        block.appendChild(hdr);
        const sc=document.createElement('div');sc.className='upcoming-slots';
        renderDaySlots(sc,dk,{showCheck:false},()=>{self.renderUpcoming()});
        block.appendChild(sc);el.appendChild(block);
      });
    }
  },

  // SCHEDULE
  schedule:{
    render(){
      const today=dateKey();DB.getOrCreateDay(today);
      const scheds=DB.scheds();
      const days=Object.keys(scheds).filter(dk=>dk>=today).sort();
      const cont=document.getElementById('sched-blocks');cont.innerHTML='';
      const self=this;
      days.forEach(dk=>{
        const block=document.createElement('div');block.className='sched-day';
        const hdr=document.createElement('div');hdr.className='sched-day-header';
        hdr.innerHTML=`<div class="sched-day-label">${fmtDate(dk)}</div>${dk!==today?`<button class="remove-day-btn" data-dk="${dk}">移除</button>`:''}`;
        block.appendChild(hdr);
        const slots=document.createElement('div');
        renderDaySlots(slots,dk,{showCheck:false},()=>self.render());
        block.appendChild(slots);cont.appendChild(block);
        hdr.querySelector('.remove-day-btn')?.addEventListener('click',()=>{
          showConfirm(`移除「${fmtDate(dk)}」的排程？`,'此日期的所有習慣排程將被移除',()=>{
            Hist.label(`移除排程日期 ${fmtDate(dk)}`);const sc=DB.scheds();delete sc[dk];DB.saveScheds(sc);showToast(`已移除 ${fmtDate(dk)} 的排程`);self.render();
          });
        });
      });
    }
  },

  // STATS
  stats:{
    sort(){return S.get(K.statsort,'count')},
    render(){
      const sk=this.sort();
      const chips=document.getElementById('stats-sort-chips');
      chips.innerHTML=[{k:'count',l:'次數'},{k:'group',l:'群組'},{k:'recent',l:'更新'}]
        .map(s=>`<button class="sort-chip${sk===s.k?' on':''}" data-s="${s.k}">${s.l}</button>`).join('');
      chips.querySelectorAll('.sort-chip').forEach(btn=>btn.addEventListener('click',()=>{S.set(K.statsort,btn.dataset.s);this.render()}));
      const chartBtn=document.createElement('button');
      chartBtn.className=`sort-chip${_statsChartMode?' on':''}`;
      chartBtn.textContent=_statsChartMode==='pie'?'餅圖':_statsChartMode==='line'?'折線':'圖表';
      chartBtn.addEventListener('click',()=>{const modes=['','pie','line'];_statsChartMode=modes[(modes.indexOf(_statsChartMode)+1)%modes.length];this.render();});
      chips.appendChild(chartBtn);
      const habits=DB.habits();const comps=DB.comps();const el=document.getElementById('stats-list');
      if(!habits.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div>還沒有習慣統計</div>`;return}
      const map={};habits.forEach(h=>{map[h.id]=[]});
      comps.forEach(c=>{if(map[c.habitId])map[c.habitId].push(c)});

      const groups=[...DB.groups()].sort((a,b)=>(a.order||0)-(b.order||0));
      const gmap=Object.fromEntries(groups.map(g=>[g.id,g]));
      const groupHabitsMap={};
      habits.forEach(h=>{const gid=h.groupId&&gmap[h.groupId]?h.groupId:'';if(!groupHabitsMap[gid])groupHabitsMap[gid]=[];groupHabitsMap[gid].push(h);});
      function groupTotal(gid){return(groupHabitsMap[gid]||[]).reduce((s,h)=>s+(map[h.id]||[]).length,0);}
      function groupRecent(gid){return(groupHabitsMap[gid]||[]).flatMap(h=>(map[h.id]||[]).map(c=>c.at)).sort().pop()||'';}

      function makeStatItem(h){
        const hc=(map[h.id]||[]).slice().sort((a,b)=>b.at.localeCompare(a.at));
        const sc=hc.length>3?' hist-scroll':'';
        const histHtml=c=>`<div class="hist-entry" data-id="${c.id}"><span class="hist-time">${fmtDateTime(c.at)}</span><button class="hist-del-btn" type="button" title="刪除">×</button></div>`;
        return`<div class="stat-item${h.isFocus?' is-focus':''}"><div class="stat-row"><span class="stat-name">${h.name}</span><span class="stat-count">${hc.length}次</span>${SVG.chev}</div><div class="stat-history${sc}">${hc.length?hc.map(histHtml).join(''):`<div class="hist-entry" style="color:var(--done)">尚無紀錄</div>`}</div></div>`;
      }

      function makeGroupStatItemEl(g,habitsInGroup){
        const total=habitsInGroup.reduce((s,h)=>s+(map[h.id]||[]).length,0);
        const div=document.createElement('div');div.className='stat-item stat-parent';
        const subsHtml=habitsInGroup.map((h,i)=>{
          const sc=(map[h.id]||[]).slice().sort((a,b)=>b.at.localeCompare(a.at));
          const scrollCls=sc.length>3?' hist-scroll':'';
          const eHtml=c=>`<div class="hist-entry" data-id="${c.id}"><span class="hist-time">${fmtDateTime(c.at)}</span><button class="hist-del-btn" type="button" title="刪除">×</button></div>`;
          return`<div class="stat-sub-section"><div class="stat-sub-hdr"><div class="stat-sub-dot" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></div><span class="stat-sub-name">${h.name}</span><span class="stat-count">${sc.length}次</span>${SVG.chev}</div><div class="stat-sub-history${scrollCls}">${sc.length?sc.map(eHtml).join(''):`<div class="hist-entry" style="color:var(--done)">尚無紀錄</div>`}</div></div>`;
        }).join('');
        div.innerHTML=`
          <div class="stat-row">
            <span class="stat-name stat-parent-name">${SVG.folder}${g.name}</span>
            <span class="stat-count">${total}次</span>
            <button class="stat-chart-toggle">圖表</button>
            ${SVG.chev}
          </div>
          <div class="stat-history"><div class="stat-chart-area"></div>${subsHtml}</div>`;
        div.querySelector('.stat-row').addEventListener('click',e=>{if(!e.target.closest('.stat-chart-toggle'))div.classList.toggle('open');});
        div.querySelectorAll('.stat-sub-hdr').forEach(hdr=>{hdr.addEventListener('click',e=>{e.stopPropagation();hdr.closest('.stat-sub-section').classList.toggle('open');});});
        const chartArea=div.querySelector('.stat-chart-area');
        div.querySelector('.stat-chart-toggle').addEventListener('click',e=>{
          e.stopPropagation();if(!div.classList.contains('open'))div.classList.add('open');
          const modes=['pie','line',''];const next=modes[(modes.indexOf(chartArea.dataset.mode||'')+1)%modes.length];
          chartArea.dataset.mode=next;chartArea.innerHTML='';
          if(!next)return;
          const slices=habitsInGroup.map((h,i)=>({label:h.name,count:(map[h.id]||[]).length,color:CHART_COLORS[i%CHART_COLORS.length]}));
          if(next==='pie'){chartArea.innerHTML=makePieSVG(slices);}
          else{
            const wk0=getWeeks(8);
            function wd(cl){return wk0.map((ws,i)=>{const we=wk0[i+1]||'9999-99-99';return cl.filter(c=>c.at.slice(0,10)>=ws&&c.at.slice(0,10)<we).length;});}
            const lines0=habitsInGroup.map((h,i)=>({label:h.name,data:wd(map[h.id]||[]),color:CHART_COLORS[i%CHART_COLORS.length]}));
            const {wk,lines}=trimLeadingEmpty(wk0,lines0);const lbs=wk.map((w,i)=>{if(i===wk.length-1)return'本週';const p=w.slice(5).split('-');return(+p[0])+'/'+parseInt(p[1]);});
            chartArea.innerHTML=makeLineSVG(lines,lbs);
          }
        });
        return div;
      }

      // ── global chart ──
      const gcEl=document.getElementById('stats-global-chart');gcEl.innerHTML='';
      if(_statsChartMode&&habits.length){
        const allSorted=[...habits].filter(h=>(map[h.id]||[]).length>0).sort((a,b)=>(map[b.id]||[]).length-(map[a.id]||[]).length);
        if(_statsChartMode==='pie'){
          const slices=allSorted.slice(0,14).map((h,i)=>({label:h.name,count:(map[h.id]||[]).length,color:CHART_COLORS[i%CHART_COLORS.length]}));
          gcEl.innerHTML=makePieSVG(slices);
        }else{
          {const wk0=getWeeks(8);let lines0=allSorted.slice(0,8).map((h,i)=>({label:h.name,data:wk0.map((ws,i2)=>{const we=wk0[i2+1]||'9999-99-99';return(map[h.id]||[]).filter(c=>c.at.slice(0,10)>=ws&&c.at.slice(0,10)<we).length;}),color:CHART_COLORS[i%CHART_COLORS.length]}));const {wk,lines}=trimLeadingEmpty(wk0,lines0);const lbs=wk.map((w,i)=>{if(i===wk.length-1)return'本週';const p=w.slice(5).split('-');return(+p[0])+'/'+parseInt(p[1]);});gcEl.innerHTML=makeLineSVG(lines,lbs);}
        }
      }

      el.innerHTML='';
      // groups with habits → group stat items (sort varies by mode)
      let groupsToShow=groups.filter(g=>groupTotal(g.id)>0);
      if(sk==='count')groupsToShow=[...groupsToShow].sort((a,b)=>groupTotal(b.id)-groupTotal(a.id));
      else if(sk==='recent')groupsToShow=[...groupsToShow].sort((a,b)=>groupRecent(b.id).localeCompare(groupRecent(a.id)));
      groupsToShow.forEach(g=>{
        const hs=(groupHabitsMap[g.id]||[]).slice().sort((a,b)=>(a.groupOrder||0)-(b.groupOrder||0));
        el.appendChild(makeGroupStatItemEl(g,hs));
      });
      // ungrouped habits → individual stat items
      let ungrouped=[...(groupHabitsMap['']||[])];
      if(sk==='count')ungrouped.sort((a,b)=>(map[b.id]||[]).length-(map[a.id]||[]).length);
      else if(sk==='recent')ungrouped.sort((a,b)=>{
        const al=(map[a.id]||[]).slice().sort((x,y)=>x.at.localeCompare(y.at)).pop()?.at||'';
        const bl=(map[b.id]||[]).slice().sort((x,y)=>x.at.localeCompare(y.at)).pop()?.at||'';
        return bl.localeCompare(al);
      });else ungrouped.sort((a,b)=>(a.groupOrder||0)-(b.groupOrder||0));
      ungrouped.filter(h=>(map[h.id]||[]).length>0).forEach(h=>{const t=document.createElement('div');t.innerHTML=makeStatItem(h);if(t.firstChild)el.appendChild(t.firstChild);});
      el.querySelectorAll('.stat-item:not(.stat-parent)').forEach(item=>{
        item.querySelector('.stat-row').addEventListener('click',()=>item.classList.toggle('open'));
      });
      el.querySelectorAll('.hist-entry[data-id]').forEach(entry=>{
        const cid=entry.dataset.id;
        // delete button
        entry.querySelector('.hist-del-btn')?.addEventListener('click',e=>{
          e.stopPropagation();
          const comp=DB.comps().find(c=>c.id===cid);if(!comp)return;
          showConfirm('確定刪除此筆紀錄？',fmtDateTime(comp.at),()=>{
            const all=DB.comps();const idx=all.findIndex(c=>c.id===cid);
            if(idx!==-1){Hist.label('刪除打勾紀錄');all.splice(idx,1);DB.saveComps(all);showToast('已刪除');}
            Pages.stats.render();
          });
        });
        // time edit
        function attachClick(){
          const timeEl=entry.querySelector('.hist-time')||entry;
          timeEl.addEventListener('click',function onClick(){
            timeEl.removeEventListener('click',onClick);
            const comp=DB.comps().find(c=>c.id===cid);
            if(!comp){attachClick();return;}
            showDateTimeModal(comp.at.slice(0,16),newVal=>{
              if(newVal){const newAt=newVal+':00';if(newAt!==comp.at){const all=DB.comps();const idx=all.findIndex(c=>c.id===cid);if(idx!==-1){Hist.label('修改完成時間');all[idx].at=newAt;DB.saveComps(all);showToast('已更新時間');}(entry.querySelector('.hist-time')||entry).textContent=fmtDateTime(newAt);flashEl(entry);Pages.stats.render();}}
              attachClick();
            });
          });
        }
        attachClick();
      });
    }
  },

  // HABITS
  habits:{
    render(){
      const cont=document.getElementById('habits-content');cont.innerHTML='';
      const groups=[...DB.groups()].sort((a,b)=>(a.order||0)-(b.order||0));
      const habits=DB.habits();const self=this;
      const wrapper=document.createElement('div');wrapper.id='groups-wrap';
      groups.forEach(g=>{wrapper.appendChild(self.makeGroupSection(g,habits.filter(h=>h.groupId===g.id),self))});
      // ungrouped
      const ungrouped=habits.filter(h=>!h.groupId||!groups.find(g=>g.id===h.groupId));
      if(ungrouped.length){
        const sec=document.createElement('div');sec.className='group-section';sec.dataset.gid='';
        sec.innerHTML=`<div class="group-header"><div class="group-label" style="color:var(--done)">未分類</div><div class="group-line"></div></div>`;
        const items=document.createElement('div');items.className='group-items';
        ungrouped.sort((a,b)=>(a.groupOrder||0)-(b.groupOrder||0)).forEach(h=>items.appendChild(self.makeHabitItem(h,self)));
        sec.appendChild(items);wrapper.appendChild(sec);
      }
      cont.appendChild(wrapper);
      // cross-group drag
      makeCrossGroupSortable(wrapper,{
        onReorder({habitId,newGroupId,newOrder}){
          const all=DB.habits();const h=all.find(x=>x.id===habitId);
          if(h)h.groupId=newGroupId||null;
          newOrder.forEach((id,i)=>{const x=all.find(h=>h.id===id);if(x)x.groupOrder=i});
          Hist.label('移動習慣');DB.saveHabits(all);self.render();
        }
      });
      makeSortable(wrapper,'.group-section[data-gid]:not([data-gid=""])',newGOrder=>{
        const all=DB.groups();newGOrder.forEach((id,i)=>{const g=all.find(x=>x.id===id);if(g)g.order=i});
        Hist.label('重新排序群組');DB.saveGroups(all);
      },'.group-header-drag');
      // add group
      const addGBtn=document.createElement('button');addGBtn.className='add-group-btn';addGBtn.textContent='＋ 新增群組';
      addGBtn.addEventListener('click',()=>{
        showModal('新增群組','群組名稱',name=>{
          Hist.label(`新增群組「${name}」`);const all=DB.groups();all.push({id:uid(),name,order:all.length});DB.saveGroups(all);showToast(`已新增群組「${name}」`);self.render();
        });
      });
      cont.appendChild(addGBtn);
      // 清除閒置習慣
      const cleanBtn=document.createElement('button');cleanBtn.className='clean-habits-btn';cleanBtn.textContent='清除閒置習慣';
      cleanBtn.addEventListener('click',()=>{
        const idle=DB.habits().filter(h=>!isHabitReferenced(h.id));
        if(!idle.length){showAlert('沒有閒置習慣','所有習慣都有排程或記錄');return;}
        const nameList=idle.map(h=>`<span style="display:block;padding:2px 0">· ${h.name}</span>`).join('');
        showConfirm(`清除 ${idle.length} 個閒置習慣？`,`${nameList}<span style="display:block;margin-top:8px;color:var(--sub);font-size:12px">這些習慣沒有任何排程與記錄</span>`,()=>{
